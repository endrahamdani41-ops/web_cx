<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMPN 110 Jakarta | Unggul & Berkarakter</title>
    <link rel="preconnect" href="https://i.ibb.co">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; }
        
        /* Menghilangkan celah putih di atas agar hero menempel ke navigasi */
        #header-placeholder { min-height: 0; }

        #hero-section {
            position: relative;
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-color: #1A2A6C;
            margin-top: 0;
        }

        .slide {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            z-index: 0;
        }

        .slide.active { opacity: 1; }

        @keyframes slowZoom {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .zoom-effect { animation: slowZoom 15s ease-in-out infinite; }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.5) 100%);
            z-index: 1;
        }

        .hero-content { position: relative; z-index: 2; }
        .glow-hover:hover { transform: translateY(-5px); transition: 0.3s; }

        /* Menghilangkan panah angka (spinner bawaan) pada input NIS */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-gray-50 text-slate-900">

    <div id="header-placeholder"></div>

    <header id="hero-section">
        <div id="slide-container" class="absolute inset-0 w-full h-full"></div>
        <div class="hero-overlay"></div>
        <div class="hero-content text-center px-6 text-white">
            <h1 class="text-5xl md:text-7xl font-black mb-4 drop-shadow-lg italic uppercase tracking-tighter">SMPN 110 Jakarta</h1>
            <p class="text-lg md:text-xl italic opacity-90 font-medium">"Terwujudnya insan yang religius, cerdas, dan mandiri"</p>
        </div>
    </header>

    <section class="relative z-20 py-16 container mx-auto px-6 -mt-24">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
            <div onclick="openModalLogin()" class="glow-hover bg-white p-8 rounded-[32px] shadow-xl text-center border-b-4 border-yellow-500 cursor-pointer group transition-all">
                <h3 class="text-4xl font-black text-[#1A2A6C]">500+</h3>
                <p class="text-gray-500 font-bold text-[10px] uppercase mt-1 tracking-widest">Siswa</p>
                <span class="text-[10px] text-blue-600 font-bold mt-4 block group-hover:underline">Akses Data Siswa →</span>
            </div>
            <div class="bg-white p-8 rounded-[32px] shadow-xl text-center border-b-4 border-yellow-500">
                <h3 class="text-4xl font-black text-[#1A2A6C]">45</h3>
                <p class="text-gray-500 font-bold text-[10px] uppercase tracking-widest">GTK</p>
            </div>
            <div class="bg-white p-8 rounded-[32px] shadow-xl text-center border-b-4 border-yellow-500">
                <h3 class="text-4xl font-black text-[#1A2A6C]">18</h3>
                <p class="text-gray-500 font-bold text-[10px] uppercase tracking-widest">Rombel</p>
            </div>
            <div class="bg-white p-8 rounded-[32px] shadow-xl text-center border-b-4 border-yellow-500">
                <h3 class="text-4xl font-black text-[#1A2A6C]">20+</h3>
                <p class="text-gray-500 font-bold text-[10px] uppercase tracking-widest">Prestasi</p>
            </div>
        </div>
    </section>

    <section id="sambutan" class="py-24 bg-white">
        <div class="container mx-auto px-6 flex flex-col md:flex-row items-center gap-16">
            <div class="w-full md:w-1/3 flex flex-col items-center">
                <div class="relative group">
                    <img id="foto-kepala-img" src="https://via.placeholder.com/400x500?text=Memuat..." 
                         class="rounded-[40px] shadow-2xl w-full h-[450px] object-contain bg-gray-100 border-4 border-white transition-opacity duration-300">
                    <div class="absolute -bottom-6 left-1/2 -translate-x-1/2 w-[90%] bg-white p-6 rounded-3xl shadow-xl text-center border border-slate-50">
                        <h3 id="nama-kepala-text" class="text-md font-black text-[#1A2A6C] leading-tight italic">Memuat...</h3>
                        <p class="text-[9px] font-bold text-gray-400 tracking-widest uppercase mt-2">Kepala Sekolah</p>
                    </div>
                </div>
            </div>
            <div class="w-full md:w-2/3 mt-12 md:mt-0 text-center md:text-left">
                <h2 class="text-4xl font-black text-[#1A2A6C] mb-6 tracking-tighter uppercase italic">Sambutan Kepala Sekolah</h2>
                <div class="h-1 w-20 bg-yellow-400 mb-8 rounded-full mx-auto md:mx-0"></div>
                <p id="teks-sambutan" class="text-gray-600 leading-relaxed italic text-lg font-medium tracking-tight">Menghubungkan ke server...</p>
            </div>
        </div>
    </section>

    <div id="modal-login" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md hidden flex items-center justify-center z-[100] p-6">
        <div class="bg-white w-full max-w-[380px] rounded-[40px] shadow-2xl p-10 relative text-center">
            <button onclick="closeModalLogin()" class="absolute top-6 right-6 text-slate-300 hover:text-slate-500 transition-colors">✕</button>
            <h2 class="text-2xl font-black text-[#1A2A6C] mb-8 uppercase italic tracking-tight">Login Siswa</h2>
            <input type="number" id="input-nis" placeholder="Masukkan NIS..." 
                   class="w-full px-6 py-4 bg-slate-50 border rounded-2xl mb-4 text-center font-bold outline-none focus:ring-2 focus:ring-yellow-400 transition-all">
            
            <button onclick="verifikasiNIS()" id="btn-login" class="w-full py-4 bg-[#1A2A6C] text-white rounded-2xl font-bold hover:bg-[#253a8c] shadow-lg uppercase transition-all active:scale-95">
                Verifikasi
            </button>
            
            <p id="error-msg" class="text-red-500 text-[10px] mt-4 font-bold hidden italic uppercase tracking-wider">NIS Tidak Terdaftar!</p>
        </div>
    </div>

    <div id="footer-placeholder"></div>
    
    <script>
        const API_BASE = 'https://script.google.com/macros/s/AKfycbxRC4tISO2LFTfu9YlwdUIu9I4LJOOwzkDtPcrkZ_lU-fUaUJBgQbU_BIDK9t9wqkjl/exec';
        let slides = [];

        async function includeLayout() {
            try {
                const [hRes, fRes] = await Promise.all([
                    fetch('header.html'),
                    fetch('footer.html')
                ]);
                
                document.getElementById('header-placeholder').innerHTML = await hRes.text();
                document.getElementById('footer-placeholder').innerHTML = await fRes.text();

                const links = document.querySelectorAll('.nav-link');
                links.forEach(link => {
                    if(link.getAttribute('href') === 'index.html') {
                        link.classList.add('text-yellow-600', 'border-b-2', 'border-yellow-500', 'pb-1');
                    }
                });
            } catch (err) { console.warn("Layout tidak ditemukan."); }
        }

        function fixUrl(url) {
            if (!url) return '';
            if (url.includes('drive.google.com')) {
                const id = url.split('/d/')[1]?.split('/')[0] || url.split('id=')[1];
                return `https://drive.google.com/uc?export=view&id=${id}`;
            }
            return url;
        }

        function initApp() {
            includeLayout();
            const cachedHero = localStorage.getItem('hero_data');
            if (cachedHero) {
                renderData(JSON.parse(cachedHero));
            }
            loadFromSheets();
            setTimeout(prefetchOtherPages, 2000);
        }

        async function loadFromSheets() {
            try {
                const res = await fetch(`${API_BASE}?sheet=Hero`);
                const data = await res.json();
                localStorage.setItem('hero_data', JSON.stringify(data));
                renderData(data);
            } catch(e) { console.error("Gagal mengambil data."); }
        }

        function renderData(data) {
            const main = data.find(i => i.kunci === 'background_utama');
            if (main) {
                document.getElementById('foto-kepala-img').src = fixUrl(main.foto_kepala);
                document.getElementById('teks-sambutan').innerText = main.isi_sambutan;
                document.getElementById('nama-kepala-text').innerText = main.nama_kepala;
            }

            const container = document.getElementById('slide-container');
            if (container.children.length === 0) {
                const urls = data.filter(i => i.url_gambar).map(i => fixUrl(i.url_gambar));
                initSlideshow(urls);
            }
        }

        function initSlideshow(urls) {
            const container = document.getElementById('slide-container');
            container.innerHTML = "";
            slides = [];
            urls.forEach((url, i) => {
                const img = new Image();
                img.src = url;
                img.className = `slide zoom-effect ${i === 0 ? 'active' : ''}`;
                container.appendChild(img);
                slides.push(img);
            });
            
            if (slides.length > 1) {
                let current = 0;
                setInterval(() => {
                    if(slides[current]) slides[current].classList.remove('active');
                    current = (current + 1) % slides.length;
                    if(slides[current]) slides[current].classList.add('active');
                }, 5000);
            }
        }

        async function verifikasiNIS() {
            const nis = document.getElementById('input-nis').value;
            if(!nis) return;
            
            const btn = document.getElementById('btn-login');
            const errorMsg = document.getElementById('error-msg');
            
            errorMsg.classList.add('hidden');
            btn.innerText = "MENGECEK..."; 
            btn.disabled = true;
            btn.classList.add('opacity-70', 'cursor-not-allowed');

            try {
                const res = await fetch(`${API_BASE}?sheet=Siswa`);
                const data = await res.json();
                const siswa = data.find(s => s.nis.toString() === nis);

                if(siswa) {
                    localStorage.setItem('namaSiswa', siswa.nama);
                    localStorage.setItem('nisSiswa', siswa.nis);
                    location.href = 'siswa.html';
                } else {
                    errorMsg.classList.remove('hidden');
                    btn.innerText = "VERIFIKASI";
                    btn.disabled = false;
                    btn.classList.remove('opacity-70', 'cursor-not-allowed');
                }
            } catch(e) { 
                alert("Gangguan koneksi."); 
                btn.innerText = "VERIFIKASI";
                btn.disabled = false;
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
            }
        }

        function prefetchOtherPages() {
            const sheets = ['Guru', 'Prestasi'];
            sheets.forEach(sh => {
                fetch(`${API_BASE}?sheet=${sh}`).then(r => r.json()).then(d => {
                    const key = sh === 'Guru' ? 'cache_data_guru' : 'cache_data_ekskul';
                    localStorage.setItem(key, JSON.stringify(d));
                }).catch(()=>{});
            });
        }

        function openModalLogin() { document.getElementById('modal-login').classList.remove('hidden'); }
        function closeModalLogin() { document.getElementById('modal-login').classList.add('hidden'); }

        initApp();
    </script>
</body>
</html>
