<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#eab308">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMPN 110 Jakarta | Unggul & Berkarakter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; overflow-x: hidden; }
        
        #hero-section { position: relative; height: 90vh; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #f1f5f9; }
        
        .slide { 
            position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; 
            opacity: 0; transition: opacity 1.2s; z-index: 0; 
        }
        .slide.active { opacity: 1; }
        
        .hero-overlay { 
            position: absolute; inset: 0; 
            background: linear-gradient(to bottom, rgba(255,255,255,0) 60%, rgba(2,6,23,0.3)); 
            z-index: 1; 
        }
        
        .dark-card { background: #1e293b; border: 1px solid rgba(255,255,255,0.05); transition: all 0.4s; cursor: pointer; display: block; }
        .dark-card:hover { transform: translateY(-10px); border-color: rgba(234, 179, 8, 0.4); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5); }
        
        .modal-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(15px); display: none; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        
        .skeleton { background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%); background-size: 200% 100%; animation: skeleton-load 1.5s infinite; }
        @keyframes skeleton-load { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        
        .centralized { text-align: center; }
    </style>
</head>
<body>

    <div id="header-placeholder"></div>

    <div id="modalSiswa" class="modal-overlay p-4">
        <div class="bg-slate-900 border border-slate-700 w-full max-w-md rounded-[40px] p-10 relative text-center">
            <button onclick="closeModal('modalSiswa')" class="absolute top-6 right-6 text-slate-500 hover:text-white">✕</button>
            <div class="text-5xl mb-4">👨‍🎓</div>
            <h2 class="text-3xl font-black text-white italic mb-8 centralized">Portal <span class="text-yellow-500">Siswa</span></h2>
            <div class="space-y-4">
                <input type="text" id="nisnInput" placeholder="MASUKKAN NIS" class="w-full bg-slate-800 border-2 border-slate-700 rounded-2xl px-6 py-5 text-white text-center font-bold tracking-widest focus:border-yellow-500 outline-none">
                <button id="btnSiswa" class="w-full bg-yellow-500 text-slate-950 font-black py-5 rounded-2xl text-sm tracking-widest hover:bg-yellow-400 transition-all">Masuk Portal</button>
            </div>
        </div>
    </div>

    <header id="hero-section">
        <div id="slide-container" class="absolute inset-0 w-full h-full bg-slate-900"></div>
        <div class="hero-overlay"></div>
        <div class="hero-content text-center px-6 relative z-10"></div>
    </header>

    <section class="relative z-20 py-16 container mx-auto px-6 -mt-32">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
            <div onclick="openModal('modalSiswa')" class="dark-card bg-slate-800/95 p-10 rounded-[45px] text-center border-b-8 border-yellow-500">
                <h3 class="text-5xl font-black text-white centralized">600+</h3>
                <p class="text-slate-400 font-bold text-[10px] mt-2 italic centralized capitalize">Jumlah Murid</p>
            </div>
            <div class="dark-card bg-slate-800/95 p-10 rounded-[45px] text-center border-b-8 border-blue-600">
                <h3 class="text-5xl font-black text-white centralized">45</h3>
                <p class="text-slate-400 font-bold text-[10px] mt-2 italic centralized capitalize">Guru & GTK</p>
            </div>
            <div class="dark-card bg-slate-800/95 p-10 rounded-[45px] text-center border-b-8 border-yellow-500">
                <h3 class="text-5xl font-black text-white centralized">18</h3>
                <p class="text-slate-400 font-bold text-[10px] mt-2 italic centralized capitalize">Ruang Kelas</p>
            </div>
            <div class="dark-card bg-slate-800/95 p-10 rounded-[45px] text-center border-b-8 border-blue-600">
                <h3 class="text-5xl font-black text-white centralized">A</h3>
                <p class="text-slate-400 font-bold text-[10px] mt-2 italic centralized capitalize">Akreditasi</p>
            </div>
        </div>
    </section>

    <section id="sambutan" class="py-20">
        <div class="container mx-auto px-6">
            <div class="bg-slate-900 rounded-[60px] p-8 md:p-12 flex flex-col md:flex-row items-center gap-12 border border-white/5 shadow-2xl">
                <div class="w-full md:w-[35%] group">
                    <div class="relative rounded-[45px] overflow-hidden shadow-2xl border border-white/10 aspect-[4/5] bg-slate-800">
                        <img id="foto-kepala-img" src="" class="w-full h-full object-cover opacity-0 transition-all duration-700 group-hover:scale-105" onload="this.style.opacity='1'">
                        <div class="absolute inset-x-0 bottom-0 p-6 bg-gradient-to-t from-slate-950 via-slate-950/60 to-transparent">
                            <h3 id="nama-kepala-text" class="text-white font-black italic text-center text-xs md:text-sm tracking-wider capitalize leading-tight">Memuat...</h3>
                            <p class="text-yellow-500 text-[8px] font-bold text-center capitalize tracking-[0.3em] mt-1">Kepala Sekolah</p>
                        </div>
                    </div>
                </div>
                <div class="w-full md:w-[65%]">
                    <div class="relative">
                        <span class="text-yellow-500 text-5xl font-serif absolute -top-8 -left-4 opacity-20">“</span>
                        <p id="teks-sambutan" class="text-slate-400 text-sm md:text-base leading-relaxed italic border-l-4 border-yellow-500 pl-8 py-2 font-medium">
                            Memuat sambutan...
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="prestasi" class="py-20 bg-slate-900/30">
        <div class="container mx-auto px-6 text-center">
            <div class="mb-12">
                <h2 class="text-4xl font-black text-white italic tracking-tighter capitalize">Prestasi <span class="text-yellow-500">Siswa</span></h2>
                <p class="text-slate-500 text-xs font-bold tracking-[0.3em] mt-2 capitalize"></p>
            </div>
            <div id="prestasi-container" class="grid grid-cols-1 md:grid-cols-3 gap-8 text-left">
                <div class="h-80 rounded-[40px] skeleton"></div>
                <div class="h-80 rounded-[40px] skeleton"></div>
                <div class="h-80 rounded-[40px] skeleton"></div>
            </div>
        </div>
    </section>

    <section id="berita" class="py-20">
        <div class="container mx-auto px-6 text-center">
            <h2 class="text-4xl font-black text-white italic mb-12 tracking-tighter capitalize">Warta <span class="text-yellow-500">Sekolah</span></h2>
            <div id="news-container" class="grid grid-cols-1 md:grid-cols-3 gap-8 text-left">
                <div class="h-80 rounded-[40px] skeleton"></div>
                <div class="h-80 rounded-[40px] skeleton"></div>
                <div class="h-80 rounded-[40px] skeleton"></div>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <script>
        const API_BASE = 'https://script.google.com/macros/s/AKfycbxLc0YGJ9HrE9YDv94qy83PlHUkSKVbs1A5vK1vI94LG0mpTwILpzEJq91y5IfRaGtD/exec';

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        async function fastFetch(sheet) {
            try {
                const r = await fetch(`${API_BASE}?sheet=${sheet}&t=${Date.now()}`);
                const data = await r.json();
                displayContent(sheet.toLowerCase(), data);
            } catch (e) { console.error(`Fetch error: ${sheet}`); }
        }

        function displayContent(type, data) {
            if (type === 'hero') {
                const main = data.find(i => (i.kunci || i.KUNCI) === 'background_utama');
                if (main) {
                    document.getElementById('foto-kepala-img').src = main.foto_kepala || main.FOTO_KEPALA;
                    document.getElementById('teks-sambutan').innerText = main.isi_sambutan || main.ISI_SAMBUTAN;
                    document.getElementById('nama-kepala-text').innerText = main.nama_kepala || main.NAMA_KEPALA;
                }
                const slides = data.filter(i => (i.url_gambar || i.URL_GAMBAR)).map(i => i.url_gambar || i.URL_GAMBAR);
                const slideHTML = slides.map((s, i) => `<img src="${s}" class="slide ${i === 0 ? 'active' : ''}" loading="lazy">`).join('');
                document.getElementById('slide-container').innerHTML = slideHTML;
                let current = 0;
                setInterval(() => {
                    const imgs = document.querySelectorAll('.slide');
                    if(imgs.length < 2) return;
                    imgs[current].classList.remove('active');
                    current = (current + 1) % imgs.length;
                    imgs[current].classList.add('active');
                }, 5000);
            }

            if (type === 'prestasi') {
                document.getElementById('prestasi-container').innerHTML = data.reverse().slice(0, 3).map(p => {
                    const judul = p.nama_prestasi || p.NAMA_PRESTASI || "Prestasi Siswa";
                    const nama = p.nama_siswa || p.NAMA_SISWA || "Siswa Berprestasi";
                    const foto = p.url_foto || p.URL_FOTO || "";
                    const peringkat = p.peringkat || p.PERINGKAT || "Juara";
                    return `
                        <div class="dark-card p-6 rounded-[40px] group">
                            <div class="overflow-hidden rounded-[30px] mb-4 bg-slate-900 relative">
                                <img src="${foto}" class="w-full h-64 object-cover group-hover:scale-110 transition-transform duration-500" onerror="this.src='https://via.placeholder.com/400x300?text=SMPN110'">
                                <div class="absolute top-4 right-4 bg-yellow-500 text-slate-950 text-[9px] font-black px-4 py-1.5 rounded-full capitalize italic shadow-lg">${peringkat}</div>
                            </div>
                            <h3 class="text-white font-black italic leading-tight text-sm capitalize mb-2">${judul}</h3>
                            <p class="text-slate-500 text-[10px] font-bold capitalize tracking-widest">${nama}</p>
                        </div>`;
                }).join('');
            }

            if (type === 'berita') {
                document.getElementById('news-container').innerHTML = data.reverse().slice(0, 3).map(n => `
                    <a href="detail-berita.html?judul=${encodeURIComponent(n.judul || n.JUDUL)}" class="dark-card p-6 rounded-[40px] group">
                        <div class="overflow-hidden rounded-[30px] mb-4 bg-slate-900">
                            <img src="${n.url_foto || n.URL_FOTO}" class="w-full h-64 object-cover group-hover:scale-110 transition-transform duration-500">
                        </div>
                        <p class="text-yellow-500 text-[9px] font-black tracking-widest mb-2 capitalize">Informasi Terbaru</p>
                        <h3 class="text-white font-black italic leading-tight text-sm capitalize">${n.judul || n.JUDUL}</h3>
                    </a>`).join('');
            }
        }

        async function includeLayouts() {
            const sections = [{ id: 'header-placeholder', file: 'header.html' }, { id: 'footer-placeholder', file: 'footer.html' }];
            sections.forEach(async (s) => {
                try {
                    const r = await fetch(s.file);
                    if (r.ok) document.getElementById(s.id).innerHTML = await r.text();
                } catch (e) { }
            });
        }

        window.onload = () => { includeLayouts(); fastFetch('Hero'); fastFetch('Berita'); fastFetch('Prestasi'); };
    </script>
</body>
</html>
