<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel SMPN 110 Jakarta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .nav-btn.active { background: #10b981; color: white; border-color: #10b981; }
        .table-container { border-radius: 20px; overflow: hidden; background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255,255,255,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(30, 41, 59, 0.5); color: #94a3b8; font-size: 11px; text-transform: uppercase; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; color: #e2e8f0; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <header class="p-6 border-b border-white/5 mb-6">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <img src="https://i.ibb.co.com/MDTybQJn/LOGO-CX-OK.png" alt="Logo" class="w-10 h-10">
                <h1 class="text-lg font-black text-[#1E90FF] italic">ADMIN <span class="text-yellow-500">SMPN 110</span></h1>
            </div>	
            <div class="flex gap-2 bg-slate-900 p-1 rounded-2xl border border-white/5">
                <button onclick="switchTab('ekskul')" id="btn-ekskul" class="nav-btn active px-6 py-2 rounded-xl text-xs font-bold transition-all">EKSKUL</button>
                <button onclick="switchTab('berita')" id="btn-berita" class="nav-btn px-6 py-2 rounded-xl text-xs font-bold transition-all text-slate-400">BERITA</button>
                <button onclick="switchTab('prestasi')" id="btn-prestasi" class="nav-btn px-6 py-2 rounded-xl text-xs font-bold transition-all text-slate-400">PRESTASI</button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-6">
        <div class="glass p-6 rounded-3xl mb-8 flex flex-col md:flex-row items-center gap-6">
            <div class="flex-1">
                <h3 class="text-xs font-bold text-emerald-400 mb-2 uppercase">Step 1: Upload Gambar</h3>
                <input type="file" id="file-upload" class="block w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:bg-emerald-500/10 file:text-emerald-400 cursor-pointer">
            </div>
            <button id="btn-upload" onclick="uploadKeImgBB()" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold px-8 py-3 rounded-2xl transition-all">UPLOAD</button>
            <div class="flex-1">
                <input type="text" id="url-hasil" readonly class="w-full bg-black/20 border border-white/5 p-2 rounded-lg text-xs text-emerald-300" placeholder="URL Gambar akan muncul di sini...">
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div id="form-ekskul" class="tab-content glass p-8 rounded-3xl border-t-4 border-emerald-500">
                    <h2 class="text-xl font-bold mb-6">INPUT EKSKUL</h2>
                    <input type="text" id="eks-nama" class="w-full bg-slate-900 p-4 rounded-xl mb-4 outline-none" placeholder="Nama Ekskul">
                    <input type="text" id="eks-jadwal" class="w-full bg-slate-900 p-4 rounded-xl mb-6 outline-none" placeholder="Jadwal (Contoh: Sabtu, 08:00)">
                    <button onclick="simpanData('Ekskul')" class="w-full bg-emerald-600 hover:bg-emerald-700 py-4 rounded-2xl font-bold">SIMPAN EKSKUL</button>
                </div>

                <div id="form-berita" class="tab-content hidden glass p-8 rounded-3xl border-t-4 border-blue-500">
                    <h2 class="text-xl font-bold mb-6">INPUT BERITA</h2>
                    <input type="text" id="news-judul" class="w-full bg-slate-900 p-4 rounded-xl mb-4 outline-none" placeholder="Judul Berita">
                    <textarea id="news-isi" class="w-full bg-slate-900 p-4 rounded-xl mb-6 h-32 outline-none" placeholder="Isi Berita"></textarea>
                    <button onclick="simpanData('Berita')" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl font-bold">POST BERITA</button>
                </div>

                <div id="form-prestasi" class="tab-content hidden glass p-8 rounded-3xl border-t-4 border-yellow-500">
                    <h2 class="text-xl font-bold mb-6">INPUT PRESTASI</h2>
                    <input type="text" id="pres-nama" class="w-full bg-slate-900 p-4 rounded-xl mb-4 outline-none" placeholder="Nama Siswa">
                    <input type="text" id="pres-juara" class="w-full bg-slate-900 p-4 rounded-xl mb-6 outline-none" placeholder="Juara / Nama Lomba">
                    <button onclick="simpanData('Prestasi')" class="w-full bg-yellow-600 hover:bg-yellow-700 py-4 rounded-2xl font-bold text-slate-900">SIMPAN PRESTASI</button>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="glass p-8 rounded-3xl min-h-[400px]">
                    <h2 id="table-title" class="text-xl font-bold mb-6 uppercase">DAFTAR EKSKUL</h2>
                    <div class="table-container">
                        <table>
                            <thead id="table-head"></thead>
                            <tbody id="table-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_KEY = "c16189c010ac8a05f3cda76f66e9b59bb";
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz6LifRZU8ZTH0Jok3IG26W8sBL-4NAWYulSfDrVft8hjP_-kBWXczTpg0bDamzZEQq/exec"; 

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active', 'text-white'));
            document.getElementById('form-' + tab).classList.remove('hidden');
            document.getElementById('btn-' + tab).classList.add('active', 'text-white');
            document.getElementById('table-title').innerText = "DAFTAR " + tab;
            loadListData(tab);
        }

        async function uploadKeImgBB() {
            const file = document.getElementById('file-upload').files[0];
            if(!file) return Swal.fire("Pilih File!", "", "warning");
            document.getElementById('btn-upload').innerText = "PROSES...";
            const formData = new FormData();
            formData.append("image", file);
            try {
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY}`, { method: "POST", body: formData });
                const json = await res.json();
                document.getElementById('url-hasil').value = json.data.url;
                document.getElementById('btn-upload').innerText = "UPLOAD";
                Swal.fire("Berhasil!", "Gambar siap digunakan.", "success");
            } catch(e) { Swal.fire("Gagal!", "Coba lagi.", "error"); }
        }

        async function loadListData(tipe) {
            const tbody = document.getElementById('table-body');
            const thead = document.getElementById('table-head');
            tbody.innerHTML = '<tr><td colspan="3" class="text-center py-10 opacity-50">Memuat data...</td></tr>';
            
            const sheetMap = { ekskul: 'Ekskul', berita: 'Berita', prestasi: 'Prestasi' };
            
            try {
                const res = await fetch(`${WEB_APP_URL}?sheet=${sheetMap[tipe]}`);
                const data = await res.json();
                
                if(tipe === 'ekskul') {
                    thead.innerHTML = '<tr><th>Nama</th><th>Jadwal</th><th>Aksi</th></tr>';
                    tbody.innerHTML = data.map(item => `<tr><td>${item.nama_ekskul || '-'}</td><td>${item.jadwal || '-'}</td><td><button onclick="hapusData('${item.nama_ekskul}', 'ekskul')" class="text-red-500"><i data-lucide="trash-2"></i></button></td></tr>`).join('');
                } else if(tipe === 'berita') {
                    thead.innerHTML = '<tr><th>Judul</th><th>Isi</th><th>Aksi</th></tr>';
                    tbody.innerHTML = data.map(item => `<tr><td>${item.judul || '-'}</td><td>${(item.isi_berita || '').substring(0,20)}...</td><td><button onclick="hapusData('${item.judul}', 'berita')" class="text-red-500"><i data-lucide="trash-2"></i></button></td></tr>`).join('');
                } else if(tipe === 'prestasi') {
                    thead.innerHTML = '<tr><th>Siswa</th><th>Prestasi</th><th>Aksi</th></tr>';
                    tbody.innerHTML = data.map(item => `<tr><td>${item.nama_siswa || '-'}</td><td>${item.prestasi || '-'}</td><td><button onclick="hapusData('${item.nama_siswa}', 'prestasi')" class="text-red-500"><i data-lucide="trash-2"></i></button></td></tr>`).join('');
                }
                lucide.createIcons();
            } catch(e) { tbody.innerHTML = '<tr><td colspan="3" class="text-center text-red-400">Gagal memuat data.</td></tr>'; }
        }

        async function simpanData(tipe) {
            const foto = document.getElementById('url-hasil').value;
            if(!foto) return Swal.fire("Upload Foto Dulu!", "", "warning");

            let payload = { type: tipe, foto: foto };
            if(tipe === 'Ekskul') {
                payload.nama = document.getElementById('eks-nama').value;
                payload.jadwal = document.getElementById('eks-jadwal').value;
            } else if(tipe === 'Berita') {
                payload.judul = document.getElementById('news-judul').value;
                payload.isi = document.getElementById('news-isi').value;
                payload.ringkasan = payload.isi.substring(0, 50);
            } else if(tipe === 'Prestasi') {
                payload.nama = document.getElementById('pres-nama').value;
                payload.juara = document.getElementById('pres-juara').value;
                payload.tahun = new Date().getFullYear().toString();
            }

            Swal.fire({ title: 'Menyimpan...', didOpen: () => Swal.showLoading() });
            try {
                await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify(payload) });
                Swal.fire("Berhasil!", "Data tersimpan.", "success");
                switchTab(tipe.toLowerCase());
            } catch(e) { Swal.fire("Error", "Gagal koneksi.", "error"); }
        }

        async function hapusData(kunci, tipe) {
            const confirm = await Swal.fire({
                title: 'Hapus data ini?',
                text: kunci,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                background: '#0f172a',
                color: '#fff'
            });

            if (confirm.isConfirmed) {
                Swal.fire({ title: 'Menghapus...', didOpen: () => Swal.showLoading() });
                try {
                    // Payload sesuai logic GAS (actionType = "hapus")
                    await fetch(WEB_APP_URL, {
                        method: "POST",
                        body: JSON.stringify({ action: "hapus", kelas: kunci })
                    });
                    Swal.fire("Terhapus!", "", "success");
                    loadListData(tipe);
                } catch(e) { Swal.fire("Gagal", "", "error"); }
            }
        }

        window.onload = () => { lucide.createIcons(); loadListData('ekskul'); };
    </script>
</body>
</html>
