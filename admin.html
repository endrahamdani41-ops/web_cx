<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel Multi-Menu | SMPN 110</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .nav-btn.active { background: #10b981; color: white; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <header class="p-6 border-b border-white/5 mb-6">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">

			
		<div class="container mx-auto px-4 py-3 flex justify-between items-center"> <a href="index.html" class="flex items-center gap-4 group">
            <div class="relative">
                <div class="w-10 h-10 flex items-center justify-center"> 
                    <img src="https://i.ibb.co.com/MDTybQJn/LOGO-CX-OK.png" 
                         alt="Logo SMPN 110" 
                         class="w-10 h-10 object-contain">
                </div>
            </div>
            
            <div class="flex flex-col">
                <h1 class="text-lg font-black text-[#1E90FF] tracking-tighter italic uppercase leading-none">
                    Admin  <span class="text-yellow-500">SMPN 110 Jakarta</span>
                </h1>
                <p class="text-[7px] font-bold text-slate-400 uppercase tracking-[0.2em] mt-1">Maju Bersama Raih Prestasi</p>
            </div>
        </a>	
			
			
			
			
			
			
			
			
			
			
			
			
			
			
            <div class="flex gap-2 bg-slate-900 p-1 rounded-2xl border border-white/5">
                <button onclick="switchTab('ekskul')" id="btn-ekskul" class="nav-btn active px-6 py-2 rounded-xl text-xs font-bold transition-all">EKSKUL</button>
                <button onclick="switchTab('berita')" id="btn-berita" class="nav-btn px-6 py-2 rounded-xl text-xs font-bold transition-all text-slate-400">BERITA</button>
                <button onclick="switchTab('prestasi')" id="btn-prestasi" class="nav-btn px-6 py-2 rounded-xl text-xs font-bold transition-all text-slate-400">PRESTASI</button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-6">
        
        <div class="glass p-6 rounded-3xl mb-8 flex flex-col md:flex-row items-center gap-6 shadow-xl">
            <div class="flex-1">
                <h3 class="text-sm font-bold text-emerald-400 mb-2 uppercase tracking-widest">Step 1: Upload Gambar</h3>
                <input type="file" id="file-upload" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-emerald-500/10 file:text-emerald-400 hover:file:bg-emerald-500/20 cursor-pointer">
            </div>
            <button id="btn-upload" onclick="uploadKeImgBB()" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold px-8 py-3 rounded-2xl transition-all flex items-center gap-2">
                <i data-lucide="upload-cloud" size="18"></i> UPLOAD
            </button>
            <div class="flex-1">
                <label class="text-[10px] text-slate-500 uppercase font-bold">Link Hasil Upload:</label>
                <input type="text" id="url-hasil" readonly class="w-full bg-black/20 border border-white/5 p-2 rounded-lg text-xs text-emerald-300 outline-none" placeholder="https://i.ibb.co.com/...">
            </div>
        </div>

        <div id="tab-berita" class="tab-content hidden animate-in fade-in duration-500">
            <div class="glass p-8 rounded-3xl shadow-2xl border-t-4 border-blue-500">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2"><i data-lucide="newspaper" class="text-blue-400"></i> INPUT BERITA BARU</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="news-judul" class="bg-slate-900 p-4 rounded-xl outline-none" placeholder="Judul Berita">
                    <select id="news-kategori" class="bg-slate-900 p-4 rounded-xl outline-none text-slate-400">
                        <option value="Kegiatan">Kegiatan Sekolah</option>
                        <option value="Pengumuman">Pengumuman</option>
                        <option value="Akademik">Akademik</option>
                    </select>
                    <textarea id="news-ringkasan" class="bg-slate-900 p-4 rounded-xl outline-none md:col-span-2" placeholder="Ringkasan Berita (Singkat)"></textarea>
                    <textarea id="news-isi" class="bg-slate-900 p-4 rounded-xl outline-none md:col-span-2 h-32" placeholder="Isi Berita Lengkap"></textarea>
                </div>
                <button onclick="simpanData('Berita')" class="mt-6 bg-blue-600 hover:bg-blue-700 text-white font-bold px-10 py-4 rounded-2xl flex items-center gap-2">
                    POST BERITA <i data-lucide="send" size="18"></i>
                </button>
            </div>
        </div>

        <div id="tab-prestasi" class="tab-content hidden animate-in fade-in duration-500">
            <div class="glass p-8 rounded-3xl shadow-2xl border-t-4 border-yellow-500">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2"><i data-lucide="trophy" class="text-yellow-400"></i> INPUT PRESTASI SISWA</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" id="pres-nama" class="bg-slate-900 p-4 rounded-xl outline-none" placeholder="Nama Siswa">
                    <input type="text" id="pres-juara" class="bg-slate-900 p-4 rounded-xl outline-none" placeholder="Juara / Nama Lomba">
                    <input type="number" id="pres-tahun" class="bg-slate-900 p-4 rounded-xl outline-none" placeholder="Tahun (Contoh: 2024)">
                </div>
                <button onclick="simpanData('Prestasi')" class="mt-6 bg-yellow-600 hover:bg-yellow-700 text-white font-bold px-10 py-4 rounded-2xl flex items-center gap-2">
                    SIMPAN PRESTASI <i data-lucide="star" size="18"></i>
                </button>
            </div>
        </div>

        <div id="tab-ekskul" class="tab-content animate-in fade-in duration-500">
            <div class="glass p-8 rounded-3xl shadow-2xl border-t-4 border-emerald-500">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2"><i data-lucide="award" class="text-emerald-400"></i> DETAIL EKSKUL</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="eks-nama" class="bg-slate-900 p-4 rounded-xl outline-none" placeholder="Nama Ekskul">
                    <input type="text" id="eks-jadwal" class="bg-slate-900 p-4 rounded-xl outline-none" placeholder="Jadwal Latihan">
                </div>
                <button onclick="simpanData('Ekskul')" class="mt-6 bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-10 py-4 rounded-2xl">SIMPAN EKSKUL</button>
            </div>
        </div>

    </main>

    <script>
        const API_KEY = "c16189c010ac8a05f3cda76f66e9b59b";
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxLc0YGJ9HrE9YDv94qy83PlHUkSKVbs1A5vK1vI94LG0mpTwILpzEJq91y5IfRaGtD/exec";

        // LOGIKA TAB
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active', 'text-white'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.add('text-slate-400'));
            
            document.getElementById('tab-' + tabName).classList.remove('hidden');
            document.getElementById('btn-' + tabName).classList.add('active', 'text-white');
            document.getElementById('btn-' + tabName).classList.remove('text-slate-400');
            lucide.createIcons();
        }

        // UPLOAD GLOBAL
        async function uploadKeImgBB() {
            const file = document.getElementById('file-upload').files[0];
            if(!file) return alert("Pilih file!");
            const btn = document.getElementById('btn-upload');
            btn.innerHTML = "PROSES...";
            
            const formData = new FormData();
            formData.append("image", file);
            
            try {
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY}`, { method: "POST", body: formData });
                const json = await res.json();
                if(json.success) {
                    const directUrl = json.data.url.replace("ibb.co", "ibb.co.com");
                    document.getElementById('url-hasil').value = directUrl;
                    btn.innerHTML = "BERHASIL ✓";
                    alert("Gambar siap! Sekarang isi detail menu di bawah.");
                }
            } catch(e) { alert("Upload gagal!"); }
        }

        // SIMPAN DATA UNIVERSAL
        async function simpanData(tipe) {
            const urlFoto = document.getElementById('url-hasil').value;
            if(!urlFoto) return alert("Upload foto dulu!");

            let payload = { type: tipe, foto: urlFoto };

            if(tipe === 'Berita') {
                payload.judul = document.getElementById('news-judul').value;
                payload.ringkasan = document.getElementById('news-ringkasan').value;
                payload.isi = document.getElementById('news-isi').value;
                payload.kategori = document.getElementById('news-kategori').value;
            } else if(tipe === 'Prestasi') {
                payload.nama = document.getElementById('pres-nama').value;
                payload.juara = document.getElementById('pres-juara').value;
                payload.tahun = document.getElementById('pres-tahun').value;
            } else {
                payload.nama = document.getElementById('eks-nama').value;
                payload.jadwal = document.getElementById('eks-jadwal').value;
            }

            try {
                const response = await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify(payload) });
                alert(await response.text());
                location.reload();
            } catch (e) { alert("Gagal kirim data!"); }
        }

        lucide.createIcons();
    </script>
</body>
</html>
