<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | SMPN 110 Jakarta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617; 
            color: #f8fafc; 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
            transition: background 0.8s ease-in-out;
            position: relative;
            min-height: 100vh;
        }
        
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.85);
            z-index: -1;
        }

        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .nav-btn { color: #94a3b8; transition: all 0.3s; border: 1px solid transparent; }
        .nav-btn.active { background: #10b981; color: white; border-color: #10b981; }
        .table-container { border-radius: 20px; overflow: hidden; background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255,255,255,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(30, 41, 59, 0.5); color: #94a3b8; font-size: 11px; text-transform: uppercase; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; color: #e2e8f0; vertical-align: middle; }
        #preview-img { max-height: 80px; border-radius: 8px; display: none; margin-top: 10px; border: 2px solid #10b981; }
        .img-table { width: 48px; height: 48px; object-fit: cover; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); }
        
        /* Style Gallery Background */
        .bg-card { position: relative; cursor: pointer; border-radius: 12px; overflow: hidden; border: 3px solid transparent; transition: 0.3s; aspect-ratio: 16/9; background: #1e293b; }
        .bg-card:hover { border-color: #10b981; }
        .bg-card img { width: 100%; height: 100%; object-fit: cover; }
        .bg-card.selected { border-color: #10b981; box-shadow: 0 0 20px rgba(16, 185, 129, 0.5); }
        
        /* Tombol Hapus di Gallery - DIPERBAIKI */
        .btn-delete-bg { 
            position: absolute; 
            top: 8px; 
            right: 8px; 
            background: #ef4444; 
            color: white; 
            padding: 8px; 
            border-radius: 8px; 
            opacity: 0; 
            transition: 0.3s; 
            z-index: 20; 
            border: none;
            cursor: pointer;
        }
        .bg-card:hover .btn-delete-bg { opacity: 1; }
    </style>
</head>
<body class="pb-20">

    <header class="p-6 border-b border-white/5 mb-6 glass sticky top-0 z-50">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <a href="index.html" class="flex items-center gap-4 group">
                <img src="https://i.ibb.co.com/MDTybQJn/LOGO-CX-OK.png" alt="Logo" class="w-10 h-10 object-contain">
                <div class="flex flex-col">
                    <h1 class="text-lg font-black text-[#1E90FF] tracking-tighter italic uppercase leading-none">
                        SMPN 110 <span class="text-yellow-500">Jakarta</span>
                    </h1>
                    <p class="text-[7px] font-bold text-slate-400 uppercase tracking-[0.2em] mt-1">Maju Bersama Raih Prestasi</p>
                </div>
            </a> 
            <div class="flex items-center gap-3">
                <div class="flex gap-2 bg-slate-900 p-1 rounded-2xl border border-white/5">
                    <button onclick="switchTab('ekskul')" id="btn-ekskul" class="nav-btn active px-6 py-2 rounded-xl text-xs font-bold uppercase">Ekskul</button>
                    <button onclick="switchTab('berita')" id="btn-berita" class="nav-btn px-6 py-2 rounded-xl text-xs font-bold uppercase">Berita</button>
                    <button onclick="switchTab('prestasi')" id="btn-prestasi" class="nav-btn px-6 py-2 rounded-xl text-xs font-bold uppercase">Prestasi</button>
                    <button onclick="switchTab('background')" id="btn-background" class="nav-btn px-6 py-2 rounded-xl text-xs font-bold uppercase">Background</button>
                </div>
                <button onclick="logoutAdmin()" class="bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white p-2.5 rounded-xl transition-all">
                    <i data-lucide="log-out" size="20"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-6">
        <div class="glass p-6 rounded-3xl mb-8 flex flex-col md:flex-row items-center gap-6 border-l-4 border-emerald-500">
            <div class="flex-1 w-full">
                <h3 class="text-[10px] font-black text-emerald-400 mb-2 uppercase tracking-widest">Step 1: Upload Gambar (IMGBB)</h3>
                <input type="file" id="file-upload" class="block w-full text-xs text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:bg-emerald-500/10 file:text-emerald-400 cursor-pointer border-none outline-none">
                <img id="preview-img" src="" alt="Preview">
            </div>
            <button id="btn-upload" onclick="uploadKeImgBB()" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold px-8 py-3 rounded-2xl transition-all text-xs tracking-widest">UPLOAD</button>
            <div class="flex-1 w-full">
                <input type="text" id="url-hasil" readonly class="w-full bg-black/20 border border-white/5 p-3 rounded-xl text-[10px] text-emerald-300 font-mono" placeholder="URL otomatis muncul di sini...">
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-stretch">
            <div class="lg:col-span-4 flex flex-col gap-6">
                <div id="form-ekskul" class="tab-content glass p-8 rounded-3xl border-t-4 border-emerald-500 h-full flex flex-col">
                    <h2 class="text-xl font-bold mb-6 italic uppercase text-emerald-400">Input Ekskul</h2>
                    <input type="text" id="eks-nama" class="w-full bg-slate-900 p-4 rounded-xl mb-4 outline-none border border-white/5" placeholder="Nama Ekskul">
                    <input type="text" id="eks-jadwal" class="w-full bg-slate-900 p-4 rounded-xl mb-6 outline-none border border-white/5" placeholder="Jadwal (Contoh: Sabtu, 08:00)">
                    <button onclick="simpanData('Ekskul')" class="w-full bg-emerald-600 hover:bg-emerald-700 py-4 rounded-2xl font-black text-xs tracking-widest mt-auto">SIMPAN DATA</button>
                </div>

                <div id="form-berita" class="tab-content hidden glass p-8 rounded-3xl border-t-4 border-blue-500 h-full flex flex-col">
                    <h2 class="text-xl font-bold mb-6 italic uppercase text-blue-400">Input Berita</h2>
                    <input type="text" id="news-judul" class="w-full bg-slate-900 p-4 rounded-xl mb-4 outline-none border border-white/5" placeholder="Judul Berita">
                    <textarea id="news-isi" class="w-full bg-slate-900 p-4 rounded-xl mb-6 flex-grow resize-none outline-none border border-white/5" placeholder="Isi Berita"></textarea>
                    <button onclick="simpanData('Berita')" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl font-black text-xs tracking-widest mt-auto">POSTING BERITA</button>
                </div>

                <div id="form-prestasi" class="tab-content hidden glass p-8 rounded-3xl border-t-4 border-yellow-500 h-full flex flex-col">
                    <h2 class="text-xl font-bold mb-6 italic uppercase text-yellow-400">Input Prestasi</h2>
                    <input type="text" id="pres-nama" class="w-full bg-slate-900 p-4 rounded-xl mb-4 outline-none border border-white/5" placeholder="Nama Siswa">
                    <input type="text" id="pres-juara" class="w-full bg-slate-900 p-4 rounded-xl mb-6 outline-none border border-white/5" placeholder="Juara / Prestasi">
                    <button onclick="simpanData('Prestasi')" class="w-full bg-yellow-600 hover:bg-yellow-700 py-4 rounded-2xl font-black text-xs tracking-widest text-slate-900 mt-auto">SIMPAN PRESTASI</button>
                </div>

                <div id="form-background" class="tab-content hidden glass p-8 rounded-3xl border-t-4 border-purple-500 h-full flex flex-col">
                    <h2 class="text-xl font-bold mb-6 italic uppercase text-purple-400">Manajemen Background</h2>
                    <p class="text-[11px] text-slate-400 mb-4">Link otomatis terisi dari Step 1. Klik tombol untuk simpan ke Sheets Hero.</p>
                    <input type="text" id="bg-url-input" class="w-full bg-slate-900 p-4 rounded-xl mb-4 outline-none border border-white/5" placeholder="URL Gambar Hero">
                    
                    <button onclick="simpanData('Hero')" class="w-full bg-purple-600 hover:bg-purple-700 py-4 rounded-2xl font-black text-xs tracking-widest uppercase mb-4">Simpan ke Sheet Hero</button>
                    
                    <button onclick="resetActiveBg()" class="w-full bg-red-500/10 text-red-500 border border-red-500/30 py-4 rounded-2xl font-black text-[10px] tracking-widest uppercase hover:bg-red-500 hover:text-white transition-all mt-auto">
                        Reset Tampilan Admin
                    </button>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="glass p-8 rounded-3xl h-full flex flex-col">
                    <div class="flex justify-between items-center mb-6">
                        <h2 id="table-title" class="text-xl font-bold uppercase italic text-emerald-400">DAFTAR EKSKUL</h2>
                        <button onclick="refreshData()" class="text-slate-400 hover:text-white transition-all">
                            <i data-lucide="refresh-cw" size="18"></i>
                        </button>
                    </div>

                    <div id="list-container" class="table-container flex-grow overflow-y-auto">
                        <table id="main-table">
                            <thead id="table-head"></thead>
                            <tbody id="table-body"></tbody>
                        </table>
                    </div>

                    <div id="gallery-container" class="hidden flex-grow overflow-y-auto">
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-4" id="bg-grid"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_KEY_IMGBB = "c16189c010ac8a05f3cda76f66e9b59b"; 
        // PASTIIN URL INI ADALAH URL DEPLOYMENT GAS TERBARU ANDA
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz22SMTpeUNN3SGduXJbMUJPVGtvsmMpP4TGV17nXWPiu0gLc8ZXFxjyJITKtV9Dq_H/exec"; 

        let currentTab = 'ekskul';
        let bgList = JSON.parse(localStorage.getItem('my_bgs')) || [];

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('form-' + tab).classList.remove('hidden');
            document.getElementById('btn-' + tab).classList.add('active');
            
            const titles = { 'ekskul': 'text-emerald-400', 'berita': 'text-blue-400', 'prestasi': 'text-yellow-400', 'background': 'text-purple-400' };
            const titleEl = document.getElementById('table-title');
            titleEl.innerText = (tab === 'background') ? "PREVIEW BACKGROUND" : "DAFTAR " + tab;
            titleEl.className = `text-xl font-bold uppercase italic ${titles[tab]}`;
            
            refreshData();
        }

        function refreshData() {
            if(currentTab === 'background') {
                document.getElementById('list-container').classList.add('hidden');
                document.getElementById('gallery-container').classList.remove('hidden');
                fetchBgFromSheets();
            } else {
                document.getElementById('list-container').classList.remove('hidden');
                document.getElementById('gallery-container').classList.add('hidden');
                loadListData(currentTab);
            }
        }

        async function fetchBgFromSheets() {
            try {
                const res = await fetch(`${WEB_APP_URL}?sheet=Hero&t=${Date.now()}`);
                const data = await res.json();
                // Gabungkan data dari Sheets dengan data lokal agar sinkron
                bgList = data.map(item => item.url_gambar || item.foto);
                renderBgGallery();
            } catch(e) { 
                console.error("Gagal ambil background dari sheets", e);
                renderBgGallery(); // Tetap render dari lokal jika gagal
            }
        }

        function renderBgGallery() {
            const grid = document.getElementById('bg-grid');
            const activeBg = localStorage.getItem('selected_bg');
            
            if (bgList.length === 0) {
                grid.innerHTML = '<p class="col-span-full text-center py-10 opacity-50 italic text-xs">Belum ada background di Gallery.</p>';
                return;
            }

            grid.innerHTML = bgList.map((url, idx) => `
                <div class="bg-card ${activeBg === url ? 'selected' : ''}" onclick="setBg('${url}')">
                    <img src="${url}" onerror="this.src='https://via.placeholder.com/300x169?text=Error+Image'">
                    <button onclick="event.stopPropagation(); hapusData('${url}', 'Hero')" class="btn-delete-bg">
                        <i data-lucide="trash-2" size="16"></i>
                    </button>
                </div>`).join('');
            lucide.createIcons();
        }

        async function simpanData(tipe) {
            const foto = document.getElementById('url-hasil').value;
            const bgLink = document.getElementById('bg-url-input').value;
            
            let payload = { type: tipe };
            
            if(tipe === 'Hero') {
                if(!bgLink) return Swal.fire("URL Kosong!", "Upload atau isi URL dulu", "error");
                payload.url_gambar = bgLink;
                payload.nama_kunci = "Slider_Baru";
            } else {
                if(!foto) return Swal.fire("Upload Foto Dulu!", "Cek Step 1", "warning");
                payload.foto = foto;
                if(tipe === 'Ekskul') { 
                    payload.nama = document.getElementById('eks-nama').value; 
                    payload.jadwal = document.getElementById('eks-jadwal').value; 
                }
                else if(tipe === 'Berita') { 
                    payload.judul = document.getElementById('news-judul').value; 
                    payload.isi = document.getElementById('news-isi').value; 
                }
                else if(tipe === 'Prestasi') { 
                    payload.nama = document.getElementById('pres-nama').value; 
                    payload.prestasi = document.getElementById('pres-juara').value; 
                }
            }
            
            Swal.fire({ title: 'Menyimpan...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            
            try {
                await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify(payload) });
                Swal.fire("Berhasil!", "Data telah masuk ke Google Sheets.", "success");
                
                // Reset
                document.getElementById('url-hasil').value = "";
                document.getElementById('preview-img').style.display = 'none';
                document.querySelectorAll('input, textarea').forEach(el => el.value = "");
                
                refreshData();
            } catch(e) { Swal.fire("Gagal!", "Server tidak merespon.", "error"); }
        }

        async function uploadKeImgBB() {
            const file = document.getElementById('file-upload').files[0];
            if(!file) return Swal.fire("Pilih File!", "", "warning");
            const btn = document.getElementById('btn-upload');
            btn.innerText = "PROSES..."; btn.disabled = true;
            const formData = new FormData(); formData.append("image", file);
            try {
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY_IMGBB}`, { method: "POST", body: formData });
                const json = await res.json();
                if(json.success) {
                    let modifiedUrl = json.data.url.replace("i.ibb.co/", "i.ibb.co.com/");
                    document.getElementById('url-hasil').value = modifiedUrl;
                    document.getElementById('preview-img').src = modifiedUrl;
                    document.getElementById('preview-img').style.display = 'block';
                    if(currentTab === 'background') document.getElementById('bg-url-input').value = modifiedUrl;
                    Swal.fire("Upload Berhasil!", "Link siap digunakan.", "success");
                }
            } catch(e) { Swal.fire("Gagal!", "Cek Koneksi", "error"); }
            finally { btn.innerText = "UPLOAD"; btn.disabled = false; }
        }

        async function loadListData(tipe) {
            const tbody = document.getElementById('table-body');
            const thead = document.getElementById('table-head');
            tbody.innerHTML = '<tr><td colspan="4" class="text-center py-10 opacity-50 italic">Memuat data...</td></tr>';
            const sheetMap = { ekskul: 'Ekskul', berita: 'Berita', prestasi: 'Prestasi' };
            try {
                const res = await fetch(`${WEB_APP_URL}?sheet=${sheetMap[tipe]}&t=${Date.now()}`);
                const data = await res.json();
                
                if(tipe === 'ekskul') {
                    thead.innerHTML = '<tr><th>Foto</th><th>Nama</th><th>Jadwal</th><th class="text-center">Aksi</th></tr>';
                    tbody.innerHTML = data.map(item => `<tr><td><img src="${item.url_foto || item.foto}" class="img-table"></td><td><b>${item.nama_ekskul || item.nama}</b></td><td>${item.jadwal}</td><td class="text-center"><button onclick="hapusData('${item.nama_ekskul || item.nama}', 'Ekskul')" class="text-red-500"><i data-lucide="trash-2" size="16"></i></button></td></tr>`).join('');
                } else if(tipe === 'berita') {
                    thead.innerHTML = '<tr><th>Foto</th><th>Judul</th><th>Isi</th><th class="text-center">Aksi</th></tr>';
                    tbody.innerHTML = data.map(item => `<tr><td><img src="${item.url_foto || item.foto}" class="img-table"></td><td><b>${item.judul}</b></td><td>${(item.isi_berita || item.isi || '').substring(0,30)}...</td><td class="text-center"><button onclick="hapusData('${item.judul}', 'Berita')" class="text-red-500"><i data-lucide="trash-2" size="16"></i></button></td></tr>`).join('');
                } else if(tipe === 'prestasi') {
                    thead.innerHTML = '<tr><th>Foto</th><th>Siswa</th><th>Prestasi</th><th class="text-center">Aksi</th></tr>';
                    tbody.innerHTML = data.map(item => `<tr><td><img src="${item.url_foto || item.foto}" class="img-table"></td><td><b>${item.nama_siswa || item.nama}</b></td><td>${item.prestasi || item.juara}</td><td class="text-center"><button onclick="hapusData('${item.nama_siswa || item.nama}', 'Prestasi')" class="text-red-500"><i data-lucide="trash-2" size="16"></i></button></td></tr>`).join('');
                }
                lucide.createIcons();
            } catch(e) { tbody.innerHTML = '<tr><td colspan="4" class="text-center text-red-400 py-10 italic">Gagal memuat.</td></tr>'; }
        }

        async function hapusData(kunci, sheetName) {
            const confirm = await Swal.fire({ 
                title: 'Hapus Data?', 
                text: "Data akan dihapus dari Google Sheets secara permanen.", 
                icon: 'warning', 
                showCancelButton: true, 
                confirmButtonColor: '#ef4444', 
                confirmButtonText: 'Ya, Hapus' 
            });
            
            if (confirm.isConfirmed) {
                Swal.fire({ title: 'Menghapus...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                try {
                    await fetch(WEB_APP_URL, { 
                        method: "POST", 
                        body: JSON.stringify({ action: "hapus", sheet: sheetName, key: kunci }) 
                    });
                    Swal.fire("Terhapus!", "", "success"); 
                    refreshData();
                } catch(e) { Swal.fire("Gagal", "Server sibuk.", "error"); }
            }
        }

        function setBg(url) {
            document.body.style.backgroundImage = `url('${url}')`;
            localStorage.setItem('selected_bg', url);
            renderBgGallery();
            Swal.fire({ title: "Background Diubah!", icon: "success", toast: true, position: "top-end", timer: 2000, showConfirmButton: false });
        }

        function resetActiveBg() {
            localStorage.removeItem('selected_bg');
            document.body.style.backgroundImage = 'none';
            renderBgGallery();
            Swal.fire("Reset!", "Tampilan admin kembali standar.", "success");
        }

        function logoutAdmin() { localStorage.removeItem('userGuru'); window.location.href = 'index.html'; }

        window.onload = () => { 
            lucide.createIcons(); 
            const saved = localStorage.getItem('selected_bg');
            if(saved) document.body.style.backgroundImage = `url('${saved}')`;
            refreshData(); 
        };
    </script>
</body>
</html>
