<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Guru & Staf | SMPN 110 Jakarta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617; 
            color: #f8fafc; 
            margin: 0;
        }
        
        .dark-card { 
            background: rgba(15, 23, 42, 0.4); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255,255,255,0.1); 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .dark-card:hover { 
            transform: translateY(-10px); 
            border-color: rgba(234, 179, 8, 0.5); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .card-img-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            border-radius: 30px;
            background: #0f172a;
        }
        .card-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }
        .dark-card:hover img { transform: scale(1.1); }

        .skeleton { 
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%); 
            background-size: 200% 100%; 
            animation: skeleton-load 1.5s infinite; 
        }
        @keyframes skeleton-load { 
            0% { background-position: 200% 0; } 
            100% { background-position: -200% 0; } 
        }
    </style>
</head>
<body class="min-h-screen">

    <div id="header-placeholder"></div>

    <main class="pt-32 pb-20">
        <div class="container mx-auto px-6">
            <div class="text-center mb-16">

                <h1 class="text-4xl md:text-5xl font-black italic text-white tracking-tighter">
                    Guru & <span class="text-yellow-500">Tenaga Kependidikan</span>
                </h1>
                <div class="h-1.5 w-24 bg-yellow-500 mx-auto mt-4 rounded-full shadow-[0_0_15px_rgba(234,179,8,0.4)]"></div>
            </div>

            <div id="guru-container" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6">
                <div class="aspect-square rounded-[40px] skeleton"></div>
                <div class="aspect-square rounded-[40px] skeleton"></div>
                <div class="aspect-square rounded-[40px] skeleton"></div>
                <div class="aspect-square rounded-[40px] skeleton"></div>
                <div class="aspect-square rounded-[40px] skeleton"></div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        const API_BASE = 'https://script.google.com/macros/s/AKfycbz22SMTpeUNN3SGduXJbMUJPVGtvsmMpP4TGV17nXWPiu0gLc8ZXFxjyJITKtV9Dq_H/exec';
        
        async function includeLayouts() {
            const sections = [
                { id: 'header-placeholder', file: 'header.html' },
                { id: 'footer-placeholder', file: 'footer.html' }
            ];
            for (const s of sections) {
                try {
                    const response = await fetch(s.file);
                    if (response.ok) {
                        const content = await response.text();
                        document.getElementById(s.id).innerHTML = content;
                    }
                } catch (e) { console.error("Gagal load " + s.file); }
            }
        }

        async function fetchGuru() {
            try {
                const response = await fetch(`${API_BASE}?sheet=Guru&t=${Date.now()}`);
                const data = await response.json();
                renderGuru(data);
            } catch (error) {
                document.getElementById('guru-container').innerHTML = `<p class="text-center col-span-full">Gagal memuat data guru.</p>`;
            }
        }

        function renderGuru(data) {
            const container = document.getElementById('guru-container');
            
            // FILTER: Menghapus akun "Admin"
            const filteredData = data.filter(g => {
                const namaGuru = (g.nama || "").toUpperCase();
                return namaGuru !== "ADMIN" && namaGuru !== "";
            });

            container.innerHTML = filteredData.map(g => {
                const nama = g.nama || "Nama Guru";
                const mataPelajaran = g.mapel || "Tenaga Pendidik"; 
                const fotoGuru = g.foto || ""; 

                return `
                <div class="dark-card p-4 rounded-[35px] text-center">
                    <div class="card-img-container mb-4 shadow-xl border border-white/5">
                        <img src="${fotoGuru}" alt="${nama}" onerror="this.src='https://via.placeholder.com/400x400?text=Guru+110'">
                    </div>
                    <div class="px-1">
                        <h3 class="text-white font-bold text-sm leading-tight capitalize mb-1">
                            ${nama.toLowerCase()}
                        </h3>
                        <p class="text-yellow-500 text-[10px] font-black capitalize tracking-widest">
                            ${mataPelajaran.toLowerCase()}
                        </p>
                    </div>
                </div>
                `;
            }).join('');
        }

        window.addEventListener('DOMContentLoaded', () => {
            includeLayouts();
            fetchGuru();
        });
    </script>
</body>
</html>
