<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#eab308">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTK | SMPN 110 Jakarta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; padding: 0; 
            background-color: #020617; 
            color: #f8fafc;
        }
        
        .guru-card {
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            overflow: hidden;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .guru-card:hover {
            transform: translateY(-15px);
            border-color: rgba(234, 179, 8, 0.5);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.8);
            background: rgba(30, 41, 59, 0.8);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #eab308; }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }

        .skeleton {
            background: linear-gradient(90deg, #0f172a 25%, #1e293b 50%, #0f172a 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="text-slate-200">

    <div id="header-placeholder"></div>

    <header class="relative py-24 text-center overflow-hidden bg-[#020617]">
        <div class="relative z-10 container mx-auto px-6">
            <h1 class="text-4xl md:text-6xl font-black italic tracking-tighter mb-4 leading-none text-white centralized">
                Guru & <span class="text-yellow-500">Tenaga Kependidikan</span>
            </h1>
            <p class="text-yellow-500 font-bold tracking-[0.4em] text-[10px] md:text-xs centralized opacity-80">
                Dedikasi Untuk Mencerdaskan Bangsa
            </p>
        </div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-yellow-500/10 blur-[120px] rounded-full"></div>
    </header>

    <section class="container mx-auto px-6 -mt-12 relative z-20">
        <div class="max-w-sm mx-auto">
            <div class="bg-slate-900/95 backdrop-blur-xl p-1 rounded-3xl shadow-2xl flex items-center border border-white/10 focus-within:border-yellow-500/50 transition-all">
                <input type="text" id="search-input" onkeyup="filterGuru()" 
                       placeholder="Cari nama atau mapel..." 
                       class="w-full bg-transparent outline-none py-3 font-semibold text-white placeholder:text-slate-600 text-xs text-center">
            </div>
        </div>
    </section>

    <section class="py-24 container mx-auto px-6">
        <div id="guru-container" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 md:gap-10">
            <div class="guru-card skeleton h-80 opacity-20"></div>
            <div class="guru-card skeleton h-80 opacity-20"></div>
            <div class="guru-card skeleton h-80 opacity-20"></div>
            <div class="guru-card skeleton h-80 opacity-20"></div>
        </div>
        
        <div id="error-state" class="hidden text-center py-20">
            <p class="text-red-400 font-bold italic tracking-widest text-sm">Gagal sinkronisasi. Menampilkan data terakhir...</p>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <script>
        const API_BASE = 'https://script.google.com/macros/s/AKfycbw8RRnxDbWemcm2XN5FsXsz27-RWzcIA0vnTVM374YJdNFJf5dl5OGsRCD5RnkC3_ND/exec';
        const CACHE_KEY = 'cache_guru_v1';
        let dataGuru = [];

        async function includeLayout() {
            try {
                const [hRes, fRes] = await Promise.all([fetch('header.html'), fetch('footer.html')]);
                if(hRes.ok) document.getElementById('header-placeholder').innerHTML = await hRes.text();
                if(fRes.ok) document.getElementById('footer-placeholder').innerHTML = await fRes.text();
            } catch(e) { console.error("Layout error"); }
        }

        function fixUrl(url) {
            if (!url) return 'https://i.ibb.co/Vv999Yp/no-profile.png';
            if (url.includes('drive.google.com')) {
                const id = url.split('/d/')[1]?.split('/')[0] || url.split('id=')[1];
                return `https://drive.google.com/uc?export=view&id=${id}`;
            }
            return url;
        }

        function displayGuru(list) {
            const container = document.getElementById('guru-container');
            if (!list || list.length === 0) {
                container.innerHTML = '<p class="text-center col-span-full text-slate-600 py-20 font-bold italic tracking-widest centralized text-xs">Data tidak ditemukan</p>';
                return;
            }

            container.innerHTML = list.map(guru => {
                const nama = guru.nama || guru.NAMA || "GTK SMPN 110";
                const mapelText = guru.mapel || guru.MAPEL || guru.jabatan || 'Tenaga Pendidik';
                const fotoUrl = fixUrl(guru.foto || guru.FOTO);

                return `
                <div class="guru-card group">
                    <div class="relative aspect-[4/5] overflow-hidden bg-slate-800">
                        <img src="${fotoUrl}" 
                             class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110" 
                             alt="${nama}"
                             loading="lazy">
                        <div class="absolute inset-0 bg-gradient-to-t from-[#020617] via-transparent to-transparent opacity-80"></div>
                    </div>
                    <div class="px-5 py-8 text-center flex flex-col items-center justify-center flex-grow min-h-[140px]">
                        <h3 class="font-extrabold text-yellow-500 text-[13px] md:text-[15px] leading-tight mb-3 italic tracking-tight line-clamp-2 centralized">
                            ${nama}
                        </h3>
                        <div class="h-[2px] w-8 bg-yellow-500/20 mb-4 rounded-full group-hover:w-16 group-hover:bg-yellow-500 transition-all"></div>
                        <p class="text-slate-400 font-bold text-[9px] md:text-[10px] tracking-[0.2em] centralized leading-none">
                            ${mapelText}
                        </p>
                    </div>
                </div>`;
            }).join('');
        }

        async function loadGuru() {
            const cached = localStorage.getItem(CACHE_KEY);
            if (cached) {
                dataGuru = JSON.parse(cached);
                displayGuru(dataGuru);
            }

            try {
                const res = await fetch(`${API_BASE}?sheet=Guru`);
                const freshData = await res.json();
                
                if (JSON.stringify(freshData) !== cached) {
                    dataGuru = freshData;
                    localStorage.setItem(CACHE_KEY, JSON.stringify(freshData));
                    displayGuru(dataGuru);
                }
                document.getElementById('error-state').classList.add('hidden');
            } catch(e) {
                if (!cached) {
                    document.getElementById('error-state').classList.remove('hidden');
                    document.getElementById('guru-container').innerHTML = '';
                }
            }
        }

        function filterGuru() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = dataGuru.filter(g => 
                (g.nama && g.nama.toLowerCase().includes(query)) || 
                (g.NAMA && g.NAMA.toLowerCase().includes(query)) ||
                (g.mapel && g.mapel.toLowerCase().includes(query)) ||
                (g.MAPEL && g.MAPEL.toLowerCase().includes(query)) ||
                (g.jabatan && g.jabatan.toLowerCase().includes(query))
            );
            displayGuru(filtered);
        }

        window.onload = () => {
            includeLayout();
            loadGuru();
        };
    </script>
</body>
</html>
