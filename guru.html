<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTK | SMPN 110 Jakarta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; }
        
        .card-shadow { box-shadow: 0 20px 50px rgba(0,0,0,0.05); }
        
        /* Menghilangkan celah putih di atas sebelum navigasi muncul */
        #header-placeholder { min-height: 0; }
        
        /* Mencegah konten melompat saat data muncul */
        #guru-container { min-height: 60vh; }
    </style>
</head>
<body class="bg-gray-50 text-slate-900">

    <div id="header-placeholder"></div>

    <header class="bg-[#1A2A6C] pt-10 pb-20 text-white text-center relative overflow-hidden mt-0">
        <div class="absolute inset-0 opacity-10">
            <svg class="w-full h-full" viewBox="0 0 100 100" preserveAspectRatio="none">
                <circle cx="10" cy="10" r="20" fill="white"/>
                <circle cx="90" cy="80" r="25" fill="white"/>
            </svg>
        </div>
        <div class="relative z-10 container mx-auto px-6">
            <h1 class="text-4xl md:text-5xl font-black mb-4 uppercase italic">Guru & Tenaga Kependidikan</h1>
            <p class="text-yellow-400 font-bold tracking-[0.3em] text-xs uppercase">Dedikasi Untuk Mencerdaskan Bangsa</p>
        </div>
    </header>

    <section class="container mx-auto px-6 -mt-8 relative z-20">
        <div class="max-w-md mx-auto">
            <div class="bg-white p-4 rounded-full shadow-2xl flex items-center px-8 border border-slate-100">
                <span class="text-xl mr-2">🔍</span>
                <input type="text" id="search-input" onkeyup="filterGuru()" placeholder="Cari nama guru..." 
                       class="w-full outline-none font-medium text-slate-600 text-center placeholder:text-slate-400">
            </div>
        </div>
    </section>

    <section class="py-20 container mx-auto px-6">
        <div id="guru-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            </div>
        
        <div id="error-state" class="hidden text-center py-20">
            <p class="text-red-500 font-bold uppercase italic">Gagal memuat data terbaru.</p>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <script>
        const API_BASE = 'https://script.google.com/macros/s/AKfycbxRC4tISO2LFTfu9YlwdUIu9I4LJOOwzkDtPcrkZ_lU-fUaUJBgQbU_BIDK9t9wqkjl/exec';
        let dataGuru = [];

        // FUNGSI 1: Memanggil Layout (Header & Footer)
        async function includeLayout() {
            try {
                const [hRes, fRes] = await Promise.all([
                    fetch('header.html'),
                    fetch('footer.html')
                ]);
                
                document.getElementById('header-placeholder').innerHTML = await hRes.text();
                document.getElementById('footer-placeholder').innerHTML = await fRes.text();

                // Menandai menu GTK aktif
                const links = document.querySelectorAll('.nav-link');
                links.forEach(link => {
                    if(link.getAttribute('href') === 'guru.html') {
                        link.classList.add('text-yellow-600', 'border-b-2', 'border-yellow-500', 'pb-1');
                    }
                });
            } catch(e) { console.error("Gagal memuat layout eksternal."); }
        }

        // FUNGSI 2: Mengambil Data Guru dengan Sistem Cache (Anti-Loading)
        async function loadGuru() {
            const cacheKey = 'cache_data_guru';
            const cachedData = localStorage.getItem(cacheKey);

            // Tampilkan data dari cache terlebih dahulu jika ada
            if (cachedData) {
                dataGuru = JSON.parse(cachedData);
                displayGuru(dataGuru);
            }

            try {
                // Ambil data terbaru dari Google Sheets di latar belakang
                const res = await fetch(`${API_BASE}?sheet=Guru`);
                const newData = await res.json();
                
                // Jika data berubah, simpan ke cache dan perbarui tampilan
                if (JSON.stringify(newData) !== cachedData) {
                    localStorage.setItem(cacheKey, JSON.stringify(newData));
                    dataGuru = newData;
                    displayGuru(dataGuru);
                }
            } catch(e) {
                if (!cachedData) document.getElementById('error-state').classList.remove('hidden');
            }
        }

        function fixUrl(url) {
            if (!url) return 'https://via.placeholder.com/300x400?text=No+Photo';
            if (url.includes('drive.google.com')) {
                const id = url.split('/d/')[1]?.split('/')[0] || url.split('id=')[1];
                return `https://drive.google.com/uc?export=view&id=${id}`;
            }
            return url;
        }

        function displayGuru(list) {
            const container = document.getElementById('guru-container');
            if (list.length === 0) {
                container.innerHTML = '<p class="text-center col-span-full text-gray-400 py-10">Data tidak ditemukan.</p>';
                return;
            }

            container.innerHTML = list.map(guru => `
                <div class="guru-card group bg-white rounded-[32px] overflow-hidden card-shadow transition-all duration-500 hover:-translate-y-2 border border-slate-50">
                    <div class="h-80 overflow-hidden relative bg-slate-100">
                        <img src="${fixUrl(guru.foto)}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" alt="${guru.nama}">
                    </div>
                    <div class="p-6 text-center">
                        <h3 class="font-black text-[#1A2A6C] text-md leading-tight mb-2 truncate" title="${guru.nama}">
                            ${guru.nama}
                        </h3>
                        <p class="text-yellow-600 font-bold text-[9px] tracking-widest uppercase">${guru.jabatan || 'GTK'}</p>
                    </div>
                </div>`).join('');
        }

        function filterGuru() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = dataGuru.filter(g => 
                g.nama.toLowerCase().includes(query) || 
                (g.jabatan && g.jabatan.toLowerCase().includes(query))
            );
            displayGuru(filtered);
        }

        // Jalankan fungsi
        window.onload = () => {
            includeLayout();
            loadGuru();
        };
    </script>
</body>
</html>
