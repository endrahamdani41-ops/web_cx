<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTK | SMPN 110 Jakarta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617; 
            color: #f8fafc;
            background-image: radial-gradient(circle at 50% -20%, #1e293b, #020617);
            min-height: 100vh;
        }

        .guru-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.4) 0%, rgba(15, 23, 42, 0.8) 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 32px;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
        }

        .guru-card:hover {
            transform: translateY(-10px);
            border-color: rgba(234, 179, 8, 0.4);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        .photo-wrapper {
            position: relative;
            margin: -50px auto 0;
            width: 130px;
            height: 130px;
            padding: 6px;
            background: linear-gradient(135deg, #eab308 0%, #846504 100%);
            border-radius: 50%;
            z-index: 10;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .photo-inner {
            width: 100%; height: 100%;
            border-radius: 50%;
            overflow: hidden;
            background: #0f172a;
            border: 3px solid #020617;
        }

        .badge-mapel {
            background: rgba(234, 179, 8, 0.1);
            color: #eab308;
            border: 1px solid rgba(234, 179, 8, 0.2);
            padding: 4px 14px;
            border-radius: 100px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            display: inline-block;
        }

        .skeleton {
            background: linear-gradient(90deg, #0f172a 25%, #1e293b 50%, #0f172a 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>

    <div id="header-include"></div>

    <header class="py-16 text-center">
        <div class="container mx-auto px-6">
            <h1 class="text-3xl md:text-4xl font-black text-white italic uppercase tracking-tighter">
                Guru & Tenaga Kependidikan
            </h1>
            <p class="text-yellow-500 font-bold tracking-[0.3em] text-[10px] uppercase mt-1 opacity-80">
                SMP Negeri 110 Jakarta
            </p>
        </div>
    </header>

    <section class="container mx-auto px-6 -mt-10 relative z-20">
        <div class="max-w-md mx-auto">
            <input type="text" id="search-input" onkeyup="filterGuru()" 
                   placeholder="Cari nama atau mata pelajaran..." 
                   class="w-full bg-slate-900/90 border border-white/10 rounded-full py-4 px-8 text-center text-white placeholder:text-slate-500 outline-none focus:border-yellow-500/50 transition-all shadow-2xl">
        </div>
    </section>

    <section class="py-20 container mx-auto px-6">
        <div id="guru-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-x-8 gap-y-24">
            <div class="guru-card skeleton h-64 opacity-20 mt-12"></div>
            <div class="guru-card skeleton h-64 opacity-20 mt-12"></div>
            <div class="guru-card skeleton h-64 opacity-20 mt-12"></div>
            <div class="guru-card skeleton h-64 opacity-20 mt-12"></div>
        </div>
    </section>

    <div id="footer-include"></div>

    <script>
        // GANTI URL INI DENGAN URL WEB APP GAS TERBARU ANDA
        const API_URL = 'https://script.google.com/macros/s/AKfycbzoiC-mjER8XVB-QeWhcJJI0RAezTlOt2J6J_nPwfqAHjn0fh-rcvwpKiDwp8obYSD9/exec';
        let dataGuru = [];

        async function includeHTML() {
            const includes = document.querySelectorAll('[id$="-include"]');
            for (const el of includes) {
                const file = el.id.replace('-include', '.html');
                try {
                    const response = await fetch(file);
                    if (response.ok) el.innerHTML = await response.text();
                } catch (e) { console.error("Gagal memuat " + file); }
            }
        }

        function toTitleCase(str) {
            if (!str) return "";
            return str.toLowerCase().replace(/\b(\w)/g, s => s.toUpperCase());
        }

        async function loadData() {
            try {
                // Tambahkan parameter t=Date.now() agar browser tidak mengambil cache lama
                const res = await fetch(`${API_URL}?sheet=Guru&t=${Date.now()}`);
                dataGuru = await res.json();
                renderCards(dataGuru);
            } catch (e) {
                console.error("Gagal memuat data guru:", e);
                document.getElementById('guru-container').innerHTML = `
                    <p class="col-span-full text-center text-slate-500 italic py-10">
                        Gagal memuat data. Pastikan API URL sudah benar.
                    </p>`;
            }
        }

        function renderCards(list) {
            const container = document.getElementById('guru-container');
            
            if (list.length === 0) {
                container.innerHTML = `<p class="col-span-full text-center text-slate-500">Guru tidak ditemukan...</p>`;
                return;
            }

            container.innerHTML = list.map(g => {
                const namaRaw = g.nama || g.NAMA || "Nama Guru";
                const namaFormatted = toTitleCase(namaRaw);
                const mapel = (g.mapel || g.MAPEL || g.mata_pelajaran || "Staff").toUpperCase();
                
                // Cek ketersediaan foto (Base64 atau URL)
                const foto = g.foto || g.foto_base64 || g.FOTO || '';

                return `
                <div class="guru-card mt-12 group">
                    <div class="px-4 pb-10 pt-4 flex flex-col items-center">
                        <div class="photo-wrapper">
                            <div class="photo-inner">
                                <img src="${foto}" 
                                     alt="${namaFormatted}" 
                                     class="w-full h-full object-cover grayscale-[20%] group-hover:grayscale-0 transition-all duration-500"
                                     onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(namaFormatted)}&background=334155&color=fff&size=256'">
                            </div>
                        </div>
                        <div class="mt-8 text-center w-full">
                            <div class="mb-4">
                                <span class="badge-mapel">${mapel}</span>
                            </div>
                            <h3 class="font-extrabold text-white text-[15px] italic tracking-tight leading-tight px-4 group-hover:text-yellow-400 transition-colors">
                                ${namaFormatted}
                            </h3>
                            <div class="h-[1px] w-12 bg-yellow-500/30 mx-auto mt-4 group-hover:w-20 group-hover:bg-yellow-500/50 transition-all"></div>
                            <p class="mt-4 text-[9px] text-slate-500 font-bold tracking-[0.2em] uppercase">SMP Negeri 110 Jakarta</p>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function filterGuru() {
            const q = document.getElementById('search-input').value.toLowerCase();
            const filtered = dataGuru.filter(g => {
                const nama = (g.nama || g.NAMA || "").toLowerCase();
                const mapel = (g.mapel || g.MAPEL || "").toLowerCase();
                return nama.includes(q) || mapel.includes(q);
            });
            renderCards(filtered);
        }

        window.onload = () => {
            includeHTML();
            loadData();
        };
    </script>
</body>
</html>
