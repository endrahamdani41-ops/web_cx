<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Siswa | SMPN 110 Jakarta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f0f4f8; 
            overflow-x: hidden;
        }
        
        .navy-gradient {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }

        .premium-card {
            background: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
        }

        /* Memaksa Nama Tetap 1 Baris & Rapi */
        .name-one-line {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
            width: 100%;
        }
        
        .white-name-shadow { 
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2); 
        }

        .status-online {
            animation: pulse-elegant 2.5s infinite;
        }

        @keyframes pulse-elegant {
            0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.6); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 12px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .fade-in { 
            animation: fadeIn 0.8s ease-out forwards; 
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen pb-24">

    <nav class="navy-gradient text-white py-4 px-6 sticky top-0 z-50 shadow-2xl">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-yellow-400 p-2 rounded-xl shadow-lg shadow-yellow-400/20">
                    <span class="text-lg">🎓</span>
                </div>
                <span class="font-extrabold uppercase tracking-tighter italic text-sm">Portal <span class="text-yellow-400">Siswa</span> 110</span>
            </div>
            <button onclick="openLogoutModal()" class="bg-white/10 hover:bg-red-500 px-5 py-2 rounded-xl text-[10px] font-black uppercase transition-all border border-white/20 active:scale-95">
                Keluar
            </button>
        </div>
    </nav>

    <main class="container mx-auto px-4 mt-8">
        
        <div class="premium-card rounded-[40px] md:rounded-[50px] overflow-hidden fade-in mb-12">
            
            <div class="py-12 md:py-16 navy-gradient relative overflow-hidden text-center md:text-left">
                <div class="absolute -right-20 -top-20 w-60 h-60 bg-blue-500/10 rounded-full blur-3xl"></div>
                <div class="container mx-auto px-8 relative z-10">
                    <div class="inline-block px-3 py-1 rounded-full glass-effect text-blue-300 text-[9px] font-bold uppercase tracking-[0.3em] mb-3">
                        Student Account
                    </div>
                    <h2 id="user-name" class="name-one-line text-2xl md:text-5xl lg:text-6xl font-black text-white uppercase italic tracking-tighter white-name-shadow">
                        Memuat Nama...
                    </h2>
                </div>
            </div>
            
            <div class="px-8 md:px-16 py-10 flex flex-col md:flex-row items-center gap-8 -mt-12 relative z-20">
                <div class="shrink-0 relative">
                    <div class="p-2 bg-white rounded-[40px] shadow-xl">
                        <div class="w-40 h-40 md:w-52 md:h-52 bg-slate-100 rounded-[35px] overflow-hidden border-4 border-white relative">
                            <div id="photo-loader" class="absolute inset-0 flex items-center justify-center bg-slate-50 z-10">
                                <div class="w-6 h-6 border-3 border-slate-200 border-t-indigo-600 rounded-full animate-spin"></div>
                            </div>
                            <img id="user-photo" src="" class="w-full h-full object-cover opacity-0 transition-opacity duration-700">
                        </div>
                    </div>
                    <div class="absolute bottom-4 right-4 bg-green-500 w-7 h-7 rounded-full border-4 border-white shadow-lg status-online"></div>
                </div>

                <div class="flex-1 w-full grid grid-cols-2 gap-4">
                    <div class="bg-slate-50 p-4 rounded-3xl border border-slate-100">
                        <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-1">NIS</span>
                        <span id="user-nis" class="font-bold text-slate-800 text-lg tracking-tighter">-----</span>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-3xl border border-slate-100">
                        <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-1">Kelas</span>
                        <span id="user-class" class="font-bold text-slate-800 text-lg tracking-tighter uppercase">---</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div onclick="location.href='jadwal.html'" class="group bg-white p-10 rounded-[40px] shadow-lg hover:shadow-xl transition-all cursor-pointer border border-slate-50 active:scale-95">
                <div class="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center text-2xl mb-6 shadow-lg shadow-indigo-600/20 text-white">📅</div>
                <h3 class="text-xl font-bold text-slate-800 tracking-tighter mb-1">Jadwal</h3>
                <p class="text-slate-500 text-xs leading-relaxed">Agenda belajar harian.</p>
                <div class="mt-6 flex items-center text-[9px] font-black text-indigo-600 uppercase tracking-widest">
                    Buka <span class="ml-2 group-hover:translate-x-1 transition-transform">→</span>
                </div>
            </div>

            <div onclick="location.href='nilai.html'" class="group bg-white p-10 rounded-[40px] shadow-lg hover:shadow-xl transition-all cursor-pointer border border-slate-50 active:scale-95">
                <div class="w-14 h-14 bg-yellow-500 rounded-2xl flex items-center justify-center text-2xl mb-6 shadow-lg shadow-yellow-500/20 text-white">📝</div>
                <h3 class="text-xl font-bold text-slate-800 tracking-tighter mb-1">Nilai</h3>
                <p class="text-slate-500 text-xs leading-relaxed">Hasil studi akademik.</p>
                <div class="mt-6 flex items-center text-[9px] font-black text-yellow-600 uppercase tracking-widest">
                    Cek <span class="ml-2 group-hover:translate-x-1 transition-transform">→</span>
                </div>
            </div>

            <div onclick="location.href='absensi.html'" class="group bg-white p-10 rounded-[40px] shadow-lg hover:shadow-xl transition-all cursor-pointer border border-slate-50 active:scale-95">
                <div class="w-14 h-14 bg-emerald-500 rounded-2xl flex items-center justify-center text-2xl mb-6 shadow-lg shadow-emerald-500/20 text-white">✅</div>
                <h3 class="text-xl font-bold text-slate-800 tracking-tighter mb-1">Absensi</h3>
                <p class="text-slate-500 text-xs leading-relaxed">Rekap kehadiran siswa.</p>
                <div class="mt-6 flex items-center text-[9px] font-black text-emerald-600 uppercase tracking-widest">
                    Lihat <span class="ml-2 group-hover:translate-x-1 transition-transform">→</span>
                </div>
            </div>
        </div>
    </main>

    <div id="logoutModal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>
        <div id="modalContent" class="relative bg-white rounded-[40px] shadow-2xl max-w-sm w-full p-10 text-center transform transition-all scale-95 opacity-0 duration-300">
            <div class="w-20 h-20 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-6 text-4xl shadow-inner">👋</div>
            <h3 class="text-2xl font-black text-slate-800 tracking-tighter mb-2">Mau Keluar?</h3>
            <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mb-8">Sesi belajar akan diakhiri.</p>
            <div class="flex flex-col gap-3">
                <button onclick="executeLogout()" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-red-500/30 active:scale-95 uppercase text-xs tracking-widest">Ya, Keluar</button>
                <button onclick="closeLogoutModal()" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-4 rounded-2xl transition-all active:scale-95 uppercase text-xs tracking-widest">Batal</button>
            </div>
        </div>
    </div>

    <script>
        const modal = document.getElementById('logoutModal');
        const modalContent = document.getElementById('modalContent');

        function loadProfile() {
            const data = localStorage.getItem('user_login');
            if (!data) { window.location.href = 'index.html'; return; }
            const user = JSON.parse(data);
            
            document.getElementById('user-name').innerText = user.nama || "Siswa";
            document.getElementById('user-nis').innerText = user.nis || "-----";
            document.getElementById('user-class').innerText = user.kelas || "---";

            const img = document.getElementById('user-photo');
            const loader = document.getElementById('photo-loader');
            const photoUrl = user.url_foto || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.nama)}&background=0f172a&color=fff&size=256&bold=true`;
            
            const tempImg = new Image();
            tempImg.src = photoUrl;
            tempImg.onload = () => {
                img.src = photoUrl;
                img.classList.remove('opacity-0');
                loader.classList.add('hidden');
            };
        }

        // FUNGSI MODAL KUSTOM
        function openLogoutModal() {
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                modalContent.classList.remove('scale-95', 'opacity-0');
                modalContent.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closeLogoutModal() {
            modalContent.classList.add('scale-95', 'opacity-0');
            modalContent.classList.remove('scale-100', 'opacity-100');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 300);
        }

        function executeLogout() {
            localStorage.removeItem('user_login');
            window.location.href = 'index.html';
        }

        window.onload = loadProfile;
    </script>
</body>
</html>
