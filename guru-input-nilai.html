<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Nilai Massal | SMPN 110 Jakarta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        
        :root {
            --bg-main: #020617;
            --bg-card: #0f172a;
            --border-color: #334155;
            --accent-yellow: #eab308;
            --accent-blue: #38bdf8;
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-main); color: #f8fafc; }
        .swal2-popup { border-radius: 24px !important; background: #1e293b !important; color: white !important; }
        
        input[type=number] { -moz-appearance: textfield; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        .input-nilai {
            width: 42px; padding: 4px 2px; background-color: #1e293b;
            border: 1px solid var(--border-color); border-radius: 6px;
            text-align: center; font-weight: 800; color: var(--accent-yellow);
            font-size: 11px; outline: none; transition: all 0.2s;
        }
        .input-nilai:focus { border-color: var(--accent-yellow); background-color: #020617; }
        
        th { 
            font-size: 10px !important; 
            padding: 8px 4px !important; 
            background-color: #1e293b;
            border: 1px solid var(--border-color);
            text-transform: uppercase;
            text-align: center;
        }

        td { 
            padding: 6px 4px !important; 
            border: 1px solid var(--border-color); 
            font-size: 11px !important; 
            vertical-align: middle;
            text-align: center;
        }

        .text-nama { text-align: left !important; padding-left: 12px !important; }
        tr:hover { background-color: rgba(51, 65, 85, 0.3); }
        
        .btn-back {
            display: flex; align-items: center; justify-content: center;
            width: 36px; height: 36px; background-color: #1e293b; 
            border-radius: 10px; transition: all 0.3s; color: white;
            border: 1px solid var(--border-color);
        }
    </style>
</head>
<body class="p-2 md:p-4">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
             <div class="flex items-center gap-3">
                <img src="https://i.ibb.co.com/MDTybQJn/LOGO-CX-OK.png" alt="Logo" class="w-10 h-10 object-contain">
                <div>
                    <h1 class="text-xs font-black uppercase text-yellow-500 tracking-tighter leading-none">Portal Guru</h1>
                    <p class="text-[9px] text-slate-500 font-bold uppercase">SMPN 110 Jakarta</p>
                </div>
            </div>

            <div class="flex flex-col items-end">
                <button onclick="window.history.back()" class="btn-back mb-2">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
                    </svg>
                </button>
                <p id="info-guru" class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Memuat...</p>
            </div>
        </div>

        <div class="bg-slate-900/60 rounded-[24px] border border-white/5 overflow-hidden shadow-2xl">
            <div class="p-4 border-b border-white/5 bg-slate-900/40">
                <label class="block text-[9px] font-black text-slate-500 uppercase mb-1">Pilih Target Kelas</label>
                <select id="select-kelas" onchange="loadSiswaDanNilai()" class="bg-slate-950 border border-slate-700 text-white px-3 py-2 rounded-lg font-bold text-[11px] outline-none focus:border-yellow-500">
                    <option value="">-- PILIH KELAS --</option>
                    <optgroup label="KELAS 7" class="bg-slate-900 text-yellow-500">
                        <option value="7A">7A</option><option value="7B">7B</option>
                        <option value="7C">7C</option><option value="7D">7D</option>
                        <option value="7E">7E</option><option value="7F">7F</option>
                    </optgroup>
                    <optgroup label="KELAS 8" class="bg-slate-900 text-yellow-500">
                        <option value="8A">8A</option><option value="8B">8B</option>
                        <option value="8C">8C</option><option value="8D">8D</option>
                        <option value="8E">8E</option><option value="8F">8F</option>
                    </optgroup>
                    <optgroup label="KELAS 9" class="bg-slate-900 text-yellow-500">
                        <option value="9A">9A</option><option value="9B">9B</option>
                        <option value="9C">9C</option><option value="9D">9D</option>
                        <option value="9E">9E</option><option value="9F">9F</option>
                    </optgroup>
                </select>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-slate-400">
                            <th class="w-10">No</th>
                            <th class="w-24">NISN</th>
                            <th class="text-nama px-4 text-left">Nama Lengkap Siswa</th>
                            <th class="w-12 bg-white/5">KKM</th>
                            <th class="w-14 text-yellow-500">PH1</th>
                            <th class="w-14 text-yellow-500">PH2</th>
                            <th class="w-14 text-blue-400">UTS</th>
                            <th class="w-14 text-green-400">UAS</th>
                            <th class="w-16 text-sky-400 bg-sky-500/10">AKHIR</th>
                        </tr>
                    </thead>
                    <tbody id="siswa-list">
                        <tr><td colspan="9" class="p-10 text-center text-slate-600 italic font-bold">Pilih kelas untuk menginput nilai...</td></tr>
                    </tbody>
                </table>
            </div>
            
            <div class="p-4 bg-slate-900/80 border-t border-white/5 flex justify-between items-center">
                <div class="flex gap-3">
                    <button onclick="downloadExcel()" class="bg-emerald-600/20 text-emerald-500 border border-emerald-600/30 font-bold px-4 py-2 rounded-lg text-[9px] uppercase hover:bg-emerald-600 hover:text-white transition-all">Excel</button>
                    <button id="btn-hapus" onclick="konfirmasiHapusMassal()" class="hidden bg-red-600/20 text-red-500 border border-red-600/30 font-bold px-4 py-2 rounded-lg text-[9px] uppercase hover:bg-red-600 hover:text-white transition-all">Hapus Baris</button>
                </div>
                <button id="btn-simpan" onclick="konfirmasiSimpan()" class="hidden bg-yellow-500 text-slate-950 font-black px-8 py-2 rounded-lg text-[9px] uppercase shadow-lg hover:scale-105 transition-all">Simpan ke Cloud</button>
            </div>
        </div>
    </div>

    <script>
        // Ganti dengan URL Web App Anda yang baru setelah Deploy
        const API_URL = 'https://script.google.com/macros/s/AKfycbzFfAlkXIpMCLzmV1IEiOMKyCRMay3zQ1AtJBf-yBaWfOOOvSJzLS7B5cbJbIc686wN/exec';
        const GURU = JSON.parse(localStorage.getItem('userGuru')) || { nama: "GURU", mapel_aktif: "MAPEL" };
        document.getElementById('info-guru').innerText = `${GURU.nama} | ${GURU.mapel_aktif}`;

        function hitungAkhir(row) {
            const ph1 = parseFloat(row.querySelector('.ph1').value) || 0;
            const ph2 = parseFloat(row.querySelector('.ph2').value) || 0;
            const uts = parseFloat(row.querySelector('.uts').value) || 0;
            const uas = parseFloat(row.querySelector('.uas').value) || 0;
            const rataPH = (ph1 + ph2) / 2;
            const akhir = ( (2 * rataPH) + uts + uas ) / 4;
            const display = row.querySelector('.nilai-akhir');
            const skorFinal = Math.round(akhir);
            display.innerText = skorFinal;
            display.className = skorFinal < 82 ? "nilai-akhir text-red-500 font-bold" : "nilai-akhir text-sky-400 font-bold";
        }

        async function loadSiswaDanNilai() {
            const kelas = document.getElementById('select-kelas').value;
            const container = document.getElementById('siswa-list');
            if(!kelas) return;
            
            container.innerHTML = '<tr><td colspan="9" class="p-10 text-center text-yellow-500 animate-pulse font-black text-[10px]">SINKRONISASI CLOUD...</td></tr>';
            
            try {
                const [resSiswa, resNilai] = await Promise.all([
                    fetch(`${API_URL}?sheet=Siswa`), fetch(`${API_URL}?sheet=Nilai`)
                ]);
                const allSiswa = await resSiswa.json();
                const allNilai = await resNilai.json();
                const filtered = allSiswa.filter(s => String(s.kelas || '').toUpperCase() === kelas.toUpperCase());

                container.innerHTML = filtered.map((s, i) => {
                    const nisn = s.nisn || '-'; 
                    const nama = s.nama || 'Tanpa Nama';
                    const exist = allNilai.find(n => String(n.nisn) === String(nisn) && n.mapel === GURU.mapel_aktif);
                    
                    return `
                        <tr class="item-siswa" data-nisn="${nisn}" data-nama="${nama}" data-kelas="${kelas}">
                            <td>${i+1}</td>
                            <td class="font-mono text-slate-400 text-[10px]">${nisn}</td>
                            <td class="text-nama font-bold text-white uppercase">${nama}</td>
                            <td class="bg-white/5">82</td>
                            <td><input type="number" oninput="hitungAkhir(this.closest('tr'))" class="input-nilai ph1" value="${exist?.nilai_ph1 || ''}"></td>
                            <td><input type="number" oninput="hitungAkhir(this.closest('tr'))" class="input-nilai ph2" value="${exist?.nilai_ph2 || ''}"></td>
                            <td><input type="number" oninput="hitungAkhir(this.closest('tr'))" class="input-nilai uts" value="${exist?.nilai_uts || ''}"></td>
                            <td><input type="number" oninput="hitungAkhir(this.closest('tr'))" class="input-nilai uas" value="${exist?.nilai_uas || ''}"></td>
                            <td class="nilai-akhir">0</td>
                        </tr>`;
                }).join('');
                
                document.querySelectorAll('.item-siswa').forEach(row => hitungAkhir(row));
                document.getElementById('btn-simpan').classList.remove('hidden');
                document.getElementById('btn-hapus').classList.remove('hidden');
            } catch(e) { 
                container.innerHTML = '<tr><td colspan="9" class="p-10 text-center text-red-500 font-bold">KONEKSI GAGAL!</td></tr>'; 
            }
        }

        async function hapusDariCloud() {
            const kelas = document.getElementById('select-kelas').value;
            const rows = document.querySelectorAll('.item-siswa');
            const btn = document.getElementById('btn-hapus');
            
            if(!kelas) return;

            btn.innerText = "MENGHAPUS..."; btn.disabled = true;

            // Payload disesuaikan dengan 'action: hapus' pada Apps Script
            const payload = {
                action: "hapus",
                kelas: kelas,
                mapel: GURU.mapel_aktif
            };

            try {
                const response = await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify(payload) 
                });
                
                const result = await response.text();

                // MEMBERSIHKAN TAMPILAN TABEL SECARA INSTAN
                rows.forEach(row => {
                    row.querySelectorAll('input').forEach(input => input.value = ''); 
                    const display = row.querySelector('.nilai-akhir');
                    display.innerText = '0';
                    display.className = "nilai-akhir text-red-500 font-bold";
                });

                Swal.fire('Berhasil!', result, 'success');
            } catch (err) { 
                Swal.fire('Error', 'Gagal menghapus data di server.', 'error'); 
            } finally { 
                btn.innerText = "Hapus Baris"; btn.disabled = false; 
            }
        }

        function konfirmasiHapusMassal() {
            Swal.fire({
                title: 'Hapus Semua Nilai?',
                text: "Nilai satu kelas untuk mapel ini akan dihapus permanen dari server!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'Ya, Hapus Semua'
            }).then((result) => {
                if (result.isConfirmed) hapusDariCloud();
            });
        }

        async function simpanKeCloud() {
            const btn = document.getElementById('btn-simpan');
            const rows = document.querySelectorAll('.item-siswa');
            const dataKirim = [];
            btn.innerText = "SINKRON..."; btn.disabled = true;

            rows.forEach(row => {
                dataKirim.push({
                    nisn: row.getAttribute('data-nisn'), 
                    nama: row.getAttribute('data-nama'),
                    kelas: row.getAttribute('data-kelas'), 
                    mapel: GURU.mapel_aktif,
                    nilai_ph1: row.querySelector('.ph1').value || 0,
                    nilai_ph2: row.querySelector('.ph2').value || 0,
                    nilai_uts: row.querySelector('.uts').value || 0,
                    nilai_uas: row.querySelector('.uas').value || 0
                });
            });

            try {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify(dataKirim) });
                Swal.fire('Berhasil!', 'Data tersimpan ke Cloud.', 'success');
            } catch (err) { Swal.fire('Error', 'Gagal menyimpan', 'error'); }
            finally { btn.innerText = "Simpan ke Cloud"; btn.disabled = false; }
        }

        function konfirmasiSimpan() {
            Swal.fire({
                title: 'Simpan Nilai?', icon: 'question', showCancelButton: true, confirmButtonText: 'Ya, Simpan'
            }).then((res) => { if (res.isConfirmed) simpanKeCloud(); });
        }

        function downloadExcel() {
            const rows = document.querySelectorAll('.item-siswa');
            if (rows.length === 0) return;
            const data = [["NISN", "NAMA", "KELAS", "MAPEL", "KKM", "PH1", "PH2", "UTS", "UAS", "AKHIR"]];
            rows.forEach(r => {
                data.push([
                    r.getAttribute('data-nisn'), r.getAttribute('data-nama'), r.getAttribute('data-kelas'), 
                    GURU.mapel_aktif, "82", r.querySelector('.ph1').value || 0, r.querySelector('.ph2').value || 0,
                    r.querySelector('.uts').value || 0, r.querySelector('.uas').value || 0,
                    r.querySelector('.nilai-akhir').innerText
                ]);
            });
            const ws = XLSX.utils.aoa_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Rekap");
            XLSX.writeFile(wb, `Nilai_${GURU.mapel_aktif}_${document.getElementById('select-kelas').value}.xlsx`);
        }
    </script>
</body>
</html>
