<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Nilai Massal | SMPN 110 Jakarta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        
        :root {
            --bg-main: #020617;
            --bg-card: #0f172a;
            --border-color: #1e293b;
            --accent-yellow: #eab308;
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-main); color: #f8fafc; scroll-behavior: smooth; }
        
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        .input-nilai {
            width: 52px; padding: 7px 2px; background-color: #0f172a;
            border: 1px solid #334155; border-radius: 8px;
            text-align: center; font-weight: 800; color: var(--accent-yellow);
            font-size: 14px; outline: none; transition: all 0.2s;
        }
        .input-nilai:focus { border-color: var(--accent-yellow); background-color: #020617; box-shadow: 0 0 8px rgba(234, 179, 8, 0.3); }
        
        th { 
            font-size: 12px !important; padding: 14px 8px !important; 
            background-color: #0f172a; border: 1px solid var(--border-color);
            text-transform: uppercase; color: #94a3b8; text-align: center !important;
        }

        td { 
            padding: 10px 6px !important; border: 1px solid var(--border-color); 
            font-size: 13px !important; vertical-align: middle; text-align: center;
        }

        .text-nama { text-align: left !important; padding-left: 15px !important; font-weight: 700; }
        .glass-card { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="p-2 md:p-6 min-h-screen">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6 px-1">
            <div class="flex items-center gap-4">
                <img src="https://i.ibb.co.com/MDTybQJn/LOGO-CX-OK.png" alt="Logo" class="w-12 h-12 object-contain">
                <div>
                    <h1 class="text-xs font-black uppercase tracking-widest leading-none text-white">Portal Guru</h1>
                    <p class="text-[10px] text-slate-500 font-bold uppercase mt-1">SMPN 110 Jakarta</p>
                </div>
            </div>
            <div class="flex flex-col items-end">
                <button onclick="window.history.back()" class="bg-slate-900 p-2.5 rounded-xl hover:bg-slate-800 transition-all text-white mb-1 border border-slate-800">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" /></svg>
                </button>
                <p id="info-guru" class="text-[10px] font-black text-slate-600 uppercase tracking-widest">Memuat Profil...</p>
            </div>
        </div>

        <div class="mb-6">
            <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-3 ml-1">Progres Kelas Anda</h3>
            <div id="status-progres" class="grid grid-cols-3 md:grid-cols-6 lg:grid-cols-9 gap-2">
                </div>
        </div>

        <div class="glass-card rounded-[24px] overflow-hidden shadow-2xl">
            <div class="p-6 border-b border-white/5 bg-slate-900/40">
                <h2 class="text-2xl md:text-3xl font-black text-yellow-500 italic uppercase tracking-tighter mb-8 text-center drop-shadow-lg">INPUT NILAI SISWA</h2>
                
                <div class="flex justify-start">
                    <div class="inline-block">
                        <label class="block text-[10px] font-black text-slate-500 uppercase mb-2 tracking-widest">Pilih Kelas</label>
                        <div class="relative">
                            <select id="select-kelas" onchange="loadSiswaDanNilai()" class="bg-slate-950 border border-slate-800 text-white pl-4 pr-10 py-2 rounded-xl font-bold text-xs outline-none focus:border-yellow-600 transition-all cursor-pointer appearance-none w-auto min-w-[150px]">
                                <option value="">-- PILIH KELAS --</option>
                                <optgroup label="KELAS 7" class="bg-slate-900 text-yellow-500">
                                    <option value="7A">7A</option><option value="7B">7B</option><option value="7C">7C</option><option value="7D">7D</option><option value="7E">7E</option><option value="7F">7F</option>
                                </optgroup>
                                <optgroup label="KELAS 8" class="bg-slate-900 text-yellow-500">
                                    <option value="8A">8A</option><option value="8B">8B</option><option value="8C">8C</option><option value="8D">8D</option><option value="8E">8E</option><option value="8F">8F</option>
                                </optgroup>
                                <optgroup label="KELAS 9" class="bg-slate-900 text-yellow-500">
                                    <option value="9A">9A</option><option value="9B">9B</option><option value="9C">9C</option><option value="9D">9D</option><option value="9E">9E</option><option value="9F">9F</option>
                                </optgroup>
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-slate-500">
                                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M19 9l-7 7-7-7"></path></svg>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-slate-400">
                            <th class="w-14">NO</th>
                            <th class="w-32">NISN</th>
                            <th class="text-nama px-4">NAMA LENGKAP SISWA</th>
                            <th class="w-20 bg-white/5">KKM</th>
                            <th class="w-24 text-yellow-500">PH1</th>
                            <th class="w-24 text-yellow-500">PH2</th>
                            <th class="w-24 text-blue-400">UTS</th>
                            <th class="w-24 text-green-400">UAS</th>
                            <th class="w-28 text-sky-400 bg-sky-500/10 font-black">AKHIR</th>
                        </tr>
                    </thead>
                    <tbody id="siswa-list">
                        <tr><td colspan="9" class="p-20 text-center text-slate-600 italic font-bold text-sm">Pilih kelas untuk memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
            
            <div class="p-6 bg-slate-900/60 border-t border-white/5 flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex gap-3">
                    <label class="cursor-pointer bg-blue-600/10 text-blue-500 border border-blue-600/20 font-bold px-5 py-3 rounded-xl text-[10px] uppercase hover:bg-blue-600 hover:text-white transition-all">
                        Impor Excel <input type="file" id="upload-excel" accept=".xlsx, .xls" class="hidden" onchange="importFromExcel(this)">
                    </label>
                    <button onclick="downloadExcel()" class="bg-emerald-600/10 text-emerald-500 border border-emerald-600/20 font-bold px-5 py-3 rounded-xl text-[10px] uppercase hover:bg-emerald-600 hover:text-white transition-all">Format</button>
                    <button id="btn-hapus" onclick="konfirmasiHapusMassal()" class="hidden bg-red-600/10 text-red-500 border border-red-600/20 font-bold px-5 py-3 rounded-xl text-[10px] uppercase hover:bg-red-600 hover:text-white transition-all">Bersihkan</button>
                </div>
                <button id="btn-simpan" onclick="konfirmasiSimpan()" class="hidden w-full md:w-auto bg-yellow-500 text-slate-950 font-black px-12 py-4 rounded-2xl text-[10px] uppercase shadow-xl hover:scale-105 transition-all tracking-widest">Simpan ke Cloud</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwdW39-guY0CZCEntxIrt1135EJPdvyZzfIMGVx9LUApaY6REBSmxJMGjITQk2edMrW/exec';
        const GURU = JSON.parse(localStorage.getItem('userGuru') || localStorage.getItem('user_login')) || { nama: "GURU", mapel: "MAPEL", MAPEL: "MAPEL" };
        const MAPEL_AKTIF = GURU.mapel || GURU.MAPEL || "MAPEL";
        document.getElementById('info-guru').innerText = `${GURU.nama || GURU.NAMA} | ${MAPEL_AKTIF}`;

        // --- DASHBOARD PROGRES TERFILTER ---
        async function cekProgresSemuaKelas() {
            const container = document.getElementById('status-progres');
            try {
                const [resSiswa, resNilai] = await Promise.all([
                    fetch(`${API_URL}?sheet=Siswa&t=${Date.now()}`),
                    fetch(`${API_URL}?sheet=Nilai&t=${Date.now()}`)
                ]);
                const allSiswa = await resSiswa.json();
                const allNilai = await resNilai.json();

                // Dapatkan kelas unik yang ada di data siswa
                const daftarKelas = [...new Set(allSiswa.map(s => s.kelas || s.KELAS))].sort();

                // Filter: Hanya tampilkan kelas jika sudah ada baris di sheet 'Nilai' 
                // untuk guru ini, atau tampilkan semua kelas jika ingin memantau ampuannya.
                container.innerHTML = daftarKelas.map(kelas => {
                    const siswaDiKelas = allSiswa.filter(s => (s.kelas || s.KELAS) === kelas);
                    const totalSiswa = siswaDiKelas.length;
                    
                    // Hitung hanya baris yang punya nilai > 0 untuk mapel guru ini
                    const sudahInput = allNilai.filter(n => {
                        const isMatch = String(n.kelas).toUpperCase() === String(kelas).toUpperCase() && 
                                        String(n.mapel).toUpperCase() === String(MAPEL_AKTIF).toUpperCase();
                        const hasValue = (Number(n.nilai_ph1) > 0 || Number(n.nilai_ph2) > 0 || 
                                          Number(n.nilai_uts) > 0 || Number(n.nilai_uas) > 0);
                        return isMatch && hasValue;
                    }).length;

                    // Lewati kelas yang bukan bagian ampuannya (0% dan belum pernah diinput sama sekali)
                    // Jika ingin menampilkan SEMUA kelas, hapus baris if di bawah ini.
                    if (sudahInput === 0 && totalSiswa > 0) {
                        // Cek apakah guru ini pernah menginput data lain di kelas ini? 
                        // Jika tidak ada data sama sekali di sheet Nilai untuk mapel ini di kelas ini, sembunyikan.
                        const pernahInput = allNilai.some(n => String(n.kelas).toUpperCase() === String(kelas).toUpperCase() && String(n.mapel).toUpperCase() === String(MAPEL_AKTIF).toUpperCase());
                        if (!pernahInput) return ''; 
                    }

                    let persen = totalSiswa > 0 ? Math.round((sudahInput / totalSiswa) * 100) : 0;
                    if (persen > 100) persen = 100;

                    const color = persen === 100 ? 'bg-emerald-500' : (persen > 0 ? 'bg-yellow-500' : 'bg-slate-700');
                    const text = persen === 100 ? 'text-emerald-400' : (persen > 0 ? 'text-yellow-500' : 'text-slate-500');

                    return `
                        <div class="bg-slate-900/80 border border-white/5 p-2 rounded-xl text-center shadow-lg">
                            <div class="text-[9px] font-black text-slate-500 uppercase leading-none mb-1">${kelas}</div>
                            <div class="text-[10px] font-black ${text}">${persen}%</div>
                            <div class="w-full bg-slate-800 h-1 mt-1 rounded-full overflow-hidden">
                                <div class="h-full ${color}" style="width: ${persen}%"></div>
                            </div>
                        </div>`;
                }).join('');
            } catch (e) { console.error(e); }
        }

        // --- LOGIKA TABEL ---
        function hitungAkhir(row) {
            const ph1 = parseFloat(row.querySelector('.ph1').value) || 0;
            const ph2 = parseFloat(row.querySelector('.ph2').value) || 0;
            const uts = parseFloat(row.querySelector('.uts').value) || 0;
            const uas = parseFloat(row.querySelector('.uas').value) || 0;
            const rataPH = (ph1 + ph2) / 2;
            const akhir = Math.round(( (2 * rataPH) + uts + uas ) / 4);
            const display = row.querySelector('.nilai-akhir');
            display.innerText = akhir;
            display.className = akhir < 82 ? "nilai-akhir text-red-500 font-black" : "nilai-akhir text-sky-400 font-black";
        }

        async function loadSiswaDanNilai() {
            const kelas = document.getElementById('select-kelas').value;
            const container = document.getElementById('siswa-list');
            if(!kelas) return;
            container.innerHTML = '<tr><td colspan="9" class="p-20 text-center text-yellow-500 animate-pulse font-black text-xs uppercase">Sinkronisasi...</td></tr>';
            try {
                const [resSiswa, resNilai] = await Promise.all([fetch(`${API_URL}?sheet=Siswa`), fetch(`${API_URL}?sheet=Nilai`)]);
                const allSiswa = await resSiswa.json();
                const allNilai = await resNilai.json();
                const filtered = allSiswa.filter(s => String(s.kelas || s.KELAS || '').toUpperCase() === kelas.toUpperCase());
                
                container.innerHTML = filtered.map((s, i) => {
                    const nisn = s.nisn || s.NISN || '-'; 
                    const nama = s.nama || s.NAMA || 'Tanpa Nama';
                    const exist = allNilai.find(n => String(n.nisn) === String(nisn) && n.mapel === MAPEL_AKTIF);
                    return `<tr class="item-siswa" data-nisn="${nisn}" data-nama="${nama}" data-kelas="${kelas}">
                        <td class="text-slate-500 font-bold">${i+1}</td>
                        <td class="font-mono text-slate-500 text-[11px]">${nisn}</td>
                        <td class="text-nama text-slate-100 uppercase italic tracking-tight">${nama}</td>
                        <td class="bg-white/5 text-slate-500 font-bold">82</td>
                        <td><input type="number" oninput="hitungAkhir(this.closest('tr'))" class="input-nilai ph1" value="${exist?.nilai_ph1 || ''}"></td>
                        <td><input type="number" oninput="hitungAkhir(this.closest('tr'))" class="input-nilai ph2" value="${exist?.nilai_ph2 || ''}"></td>
                        <td><input type="number" oninput="hitungAkhir(this.closest('tr'))" class="input-nilai uts" value="${exist?.nilai_uts || ''}"></td>
                        <td><input type="number" oninput="hitungAkhir(this.closest('tr'))" class="input-nilai uas" value="${exist?.nilai_uas || ''}"></td>
                        <td class="bg-sky-500/5"><span class="nilai-akhir">0</span></td>
                    </tr>`;
                }).join('');
                document.querySelectorAll('.item-siswa').forEach(row => hitungAkhir(row));
                document.getElementById('btn-simpan').classList.remove('hidden');
                document.getElementById('btn-hapus').classList.remove('hidden');
            } catch(e) { container.innerHTML = '<tr><td colspan="9" class="p-10 text-center text-red-500 font-bold">Gagal!</td></tr>'; }
        }

        // --- IMPOR & EKSPOR ---
        function importFromExcel(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const excelRows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                const tableRows = document.querySelectorAll('.item-siswa');
                let matchCount = 0;
                excelRows.forEach(excelRow => {
                    const nisnExcel = String(excelRow.NISN || excelRow.nisn || '').trim();
                    tableRows.forEach(htmlRow => {
                        if (nisnExcel === htmlRow.getAttribute('data-nisn').trim() && nisnExcel !== '') {
                            htmlRow.querySelector('.ph1').value = excelRow.PH1 || excelRow.ph1 || 0;
                            htmlRow.querySelector('.ph2').value = excelRow.PH2 || excelRow.ph2 || 0;
                            htmlRow.querySelector('.uts').value = excelRow.UTS || excelRow.uts || 0;
                            htmlRow.querySelector('.uas').value = excelRow.UAS || excelRow.uas || 0;
                            hitungAkhir(htmlRow); matchCount++;
                        }
                    });
                });
                Swal.fire(matchCount > 0 ? 'Berhasil!' : 'Gagal', matchCount + ' data dicocokkan.', matchCount > 0 ? 'success' : 'error');
                input.value = '';
            };
            reader.readAsArrayBuffer(file);
        }

        async function simpanKeCloud() {
            const btn = document.getElementById('btn-simpan');
            const dataKirim = [];
            btn.innerText = "MENYIMPAN..."; btn.disabled = true;
            document.querySelectorAll('.item-siswa').forEach(row => {
                dataKirim.push({
                    nisn: row.getAttribute('data-nisn'), nama: row.getAttribute('data-nama'), kelas: row.getAttribute('data-kelas'), 
                    mapel: MAPEL_AKTIF, nilai_ph1: row.querySelector('.ph1').value || 0, nilai_ph2: row.querySelector('.ph2').value || 0,
                    nilai_uts: row.querySelector('.uts').value || 0, nilai_uas: row.querySelector('.uas').value || 0
                });
            });
            try {
                const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "simpan_massal", data: dataKirim }) });
                if((await response.text()).includes("Berhasil")) {
                    Swal.fire('Tersimpan!', 'Database Cloud diperbarui.', 'success');
                    cekProgresSemuaKelas();
                }
            } catch (err) { Swal.fire('Error', 'Koneksi terputus.', 'error'); }
            finally { btn.innerText = "Simpan ke Cloud"; btn.disabled = false; }
        }

        function konfirmasiSimpan() { Swal.fire({ title: 'Simpan ke Cloud?', icon: 'question', showCancelButton: true, confirmButtonColor: '#eab308' }).then((res) => { if (res.isConfirmed) simpanKeCloud(); }); }
        
        function downloadExcel() {
            const rows = document.querySelectorAll('.item-siswa');
            if (rows.length === 0) return;
            const data = [["NO", "NISN", "NAMA", "KELAS", "MAPEL", "KKM", "PH1", "PH2", "UTS", "UAS", "AKHIR"]];
            rows.forEach((r, idx) => {
                data.push([idx+1, r.getAttribute('data-nisn'), r.getAttribute('data-nama'), r.getAttribute('data-kelas'), MAPEL_AKTIF, "82", r.querySelector('.ph1').value || 0, r.querySelector('.ph2').value || 0, r.querySelector('.uts').value || 0, r.querySelector('.uas').value || 0, r.querySelector('.nilai-akhir').innerText]);
            });
            const ws = XLSX.utils.aoa_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Rekap");
            XLSX.writeFile(wb, `Format_Nilai_${MAPEL_AKTIF}_${document.getElementById('select-kelas').value}.xlsx`);
        }

        function konfirmasiHapusMassal() {
            Swal.fire({ title: 'Bersihkan Layar?', text: 'Menghapus tampilan nilai di layar (bukan di cloud)', icon: 'warning', showCancelButton: true }).then((result) => {
                if (result.isConfirmed) { document.querySelectorAll('.input-nilai').forEach(i => i.value = ''); document.querySelectorAll('.nilai-akhir').forEach(a => a.innerText = '0'); }
            });
        }

        window.onload = cekProgresSemuaKelas;
    </script>
</body>
</html>
