<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prestasi Siswa | SMPN 110 Jakarta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617; 
            color: #f8fafc; 
            margin: 0;
        }
        
        /* Card Styling */
        .dark-card { 
            background: rgba(15, 23, 42, 0.4); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255,255,255,0.1); 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .dark-card:hover { 
            transform: translateY(-10px); 
            border-color: rgba(234, 179, 8, 0.5); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* Container Foto (16:9) agar seragam */
        .card-img-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            border-radius: 24px;
            background: #0f172a;
        }
        .card-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }
        .dark-card:hover img { transform: scale(1.1); }

        /* Skeleton Loading Animation */
        .skeleton { 
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%); 
            background-size: 200% 100%; 
            animation: skeleton-load 1.5s infinite; 
        }
        @keyframes skeleton-load { 
            0% { background-position: 200% 0; } 
            100% { background-position: -200% 0; } 
        }
    </style>
</head>

<body class="min-h-screen">

    <div id="header-placeholder"></div>

    <main class="pt-32 pb-20">
        <div class="container mx-auto px-6">
            <div class="text-center mb-16">
                 <h1 class="text-4xl md:text-5xl font-black italic text-white tracking-tighter">
                    Prestasi <span class="text-yellow-500">Siswa</span>
                </h1>
                <div class="h-1.5 w-24 bg-yellow-500 mx-auto mt-4 rounded-full shadow-[0_0_15px_rgba(234,179,8,0.4)]"></div>
            </div>

            <div id="prestasi-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                <div class="h-80 rounded-[40px] skeleton"></div>
                <div class="h-80 rounded-[40px] skeleton"></div>
                <div class="h-80 rounded-[40px] skeleton"></div>
                <div class="h-80 rounded-[40px] skeleton"></div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        const API_BASE = 'https://script.google.com/macros/s/AKfycbz22SMTpeUNN3SGduXJbMUJPVGtvsmMpP4TGV17nXWPiu0gLc8ZXFxjyJITKtV9Dq_H/exec';
        
        // Fungsi memperbaiki link gambar i.ibb.co
        const fixUrl = (url) => url ? url.replace("i.ibb.co/", "i.ibb.co.com/") : "";

        // 1. FUNGSI UNTUK MEMANGGIL HEADER & FOOTER
        async function includeLayouts() {
            const sections = [
                { id: 'header-placeholder', file: 'header.html' },
                { id: 'footer-placeholder', file: 'footer.html' }
            ];

            for (const s of sections) {
                try {
                    const response = await fetch(s.file);
                    if (response.ok) {
                        const content = await response.text();
                        document.getElementById(s.id).innerHTML = content;
                    }
                } catch (error) {
                    console.error(`Gagal memuat ${s.file}:`, error);
                }
            }
        }

        // 2. FUNGSI AMBIL DATA DARI GOOGLE SHEETS
        async function fetchPrestasi() {
            try {
                const response = await fetch(`${API_BASE}?sheet=Prestasi&t=${Date.now()}`);
                const data = await response.json();
                renderPrestasi(data);
            } catch (error) {
                console.error("Gagal memuat data:", error);
                document.getElementById('prestasi-container').innerHTML = `<p class="text-center col-span-full text-red-400">Gagal memuat data prestasi.</p>`;
            }
        }

        // 3. FUNGSI TAMPILKAN DATA KE HTML
        function renderPrestasi(data) {
            const container = document.getElementById('prestasi-container');
            const reversedData = [...data].reverse();

            container.innerHTML = reversedData.map(p => {
                // Sesuai kolom di Google Sheets: nama_siswa, prestasi, url_foto
                const judulPrestasi = p.prestasi || p.PRESTASI || "Juara Lomba";
                const namaSiswa = p.nama_siswa || p.NAMA_SISWA || "Siswa Berprestasi";
                const foto = p.url_foto || p.URL_FOTO || "";

                return `
                <div class="dark-card p-5 rounded-[40px]">
                    <div class="card-img-container mb-5 shadow-lg">
                        <img src="${fixUrl(foto)}" alt="${judulPrestasi}" onerror="this.src='https://via.placeholder.com/400x225?text=No+Image'">
                    </div>
                    <div class="px-2 flex-grow">
                        <div class="flex items-center gap-2 mb-3">
                            <span class="bg-yellow-500/10 text-yellow-500 text-[9px] font-black px-2.5 py-1 rounded-full uppercase tracking-widest border border-yellow-500/20">
                                🏆 Achievement
                            </span>
                        </div>
                        <h3 class="text-white font-black italic text-lg leading-tight uppercase tracking-tight mb-1">
                            ${judulPrestasi}
                        </h3>
                        <p class="text-slate-400 text-sm font-bold mb-3 uppercase tracking-wider">
                            ${namaSiswa}
                        </p>
                    </div>
                </div>
                `;
            }).join('');
        }

        // Jalankan semua fungsi saat halaman dimuat
        window.addEventListener('DOMContentLoaded', () => {
            includeLayouts(); // Panggil Header & Footer
            fetchPrestasi();  // Panggil Data Prestasi
        });
    </script>
</body>
</html>
