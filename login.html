<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Siswa | SMPN 110 Jakarta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        /* Menghapus spinner di kotak NIS */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="glass-card w-full max-w-[400px] rounded-[40px] shadow-2xl overflow-hidden p-10 md:p-12 transform transition-all">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black text-slate-800 tracking-tighter italic">E-REPORT</h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em]">SMPN 110 Jakarta</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label class="block text-[10px] font-black text-slate-500 mb-2 uppercase tracking-widest ml-1">Nomor Induk Siswa (NIS)</label>
                <input type="number" id="nis" 
                    class="w-full p-4 bg-slate-100 border-2 border-transparent focus:border-indigo-500 focus:bg-white rounded-2xl outline-none font-bold transition-all text-center" 
                    placeholder="Masukkan NIS" required>
            </div>

            <button type="submit" id="submit-btn" 
                class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl shadow-xl active:scale-95 transition-all uppercase tracking-widest text-xs">
                Masuk ke Dashboard
            </button>
        </form>

        <div id="error-msg" class="hidden mt-6 p-4 bg-red-50 text-red-600 rounded-2xl text-center text-[10px] font-bold uppercase italic tracking-widest">
            NIS Tidak Ditemukan!
        </div>
    </div>

    <script>
        // PASTIKAN URL API ANDA SUDAH BENAR
        const API_URL = 'https://script.google.com/macros/s/AKfycbxCHOmBjU3pQ9eRC76b4Xw1NoXQCM2_ugnsmYTXdBFEWdYauqvqBgRVPvMWBp0xOBU9/exec';

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submit-btn');
            const errorMsg = document.getElementById('error-msg');
            const nisInput = document.getElementById('nis').value.trim();

            // Reset Tampilan & Efek Loading
            submitBtn.disabled = true;
            submitBtn.innerText = 'MENGECEK DATA...';
            errorMsg.classList.add('hidden');

            try {
                // Fetch data dari tab 'Siswa'
                const response = await fetch(`${API_URL}?sheet=Siswa`);
                const rawData = await response.json();
                
                // Normalisasi Key menjadi huruf kecil untuk menghindari error Case-Sensitive
                const dataSiswa = rawData.map(item => {
                    let normalized = {};
                    for (let key in item) {
                        normalized[key.toLowerCase().trim()] = item[key];
                    }
                    return normalized;
                });

                // Pencarian NIS yang lebih kuat (membandingkan string yang sudah di-trim)
                const user = dataSiswa.find(u => String(u.nis).trim() === nisInput);

                if (user) {
                    // Simpan data user lengkap ke localStorage
                    localStorage.setItem('user_login', JSON.stringify(user));
                    
                    submitBtn.innerText = 'BERHASIL! MENGALIHKAN...';
                    setTimeout(() => {
                        window.location.href = 'dashboard-siswa.html';
                    }, 500);
                } else {
                    throw new Error("NOT_FOUND");
                }
            } catch (error) {
                console.error(error);
                errorMsg.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.innerText = 'MASUK KE DASHBOARD';
                
                if (error.message === "NOT_FOUND") {
                    errorMsg.innerText = "NIS TIDAK DITEMUKAN!";
                } else {
                    errorMsg.innerText = "GANGGUAN KONEKSI SERVER";
                }
            }
        });
    </script>
</body>
</html>
