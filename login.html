<!DOCTYPE html>
<html lang="id">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#eab308">
<link rel="apple-touch-icon" href="icon-192.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Siswa | SMPN 110 Jakarta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0f172a; /* Warna gelap sesuai screenshot */
        }
        .glass-card {
            background: #f8fafc;
            border-radius: 50px;
        }
        /* Menghilangkan spinner di kotak NIS */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="glass-card relative w-full max-w-[450px] shadow-2xl overflow-hidden p-12 md:p-16 transform transition-all">
        
        <a href="index.html" class="absolute top-10 left-10 text-slate-400 hover:text-blue-600 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
        </a>

        <div class="text-center mb-12">
            <h1 class="text-4xl font-black italic uppercase tracking-tighter text-slate-900">
                SISWA <span class="text-blue-600">PORTAL</span>
            </h1>
            <p class="text-[11px] font-bold text-slate-400 uppercase tracking-[0.2em] mt-2">Masuk ke Dashboard Nilai</p>
        </div>

        <form id="login-form" class="space-y-8">
            <div class="relative">
                <input type="number" id="nis" 
                    class="w-full p-6 bg-white border-2 border-blue-500 rounded-3xl outline-none font-bold text-xl text-center text-slate-700 shadow-sm focus:ring-4 focus:ring-blue-100 transition-all placeholder:text-slate-300" 
                    placeholder="Masukkan NIS Anda..." required>
            </div>

            <button type="submit" id="submit-btn" 
                class="w-full bg-[#0f172a] text-white font-black py-5 rounded-3xl shadow-xl active:scale-95 transition-all uppercase tracking-[0.2em] text-xs">
                Masuk ke Dashboard
            </button>
        </form>

        <div id="error-msg" class="hidden mt-6 p-4 bg-red-50 text-red-600 rounded-2xl text-center text-[10px] font-bold uppercase italic tracking-widest">
            NIS Tidak Ditemukan!
        </div>

        <div class="mt-20 text-center">
            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest leading-loose">
                &copy; 2026 SMP NEGERI 110 JAKARTA<br>
                SISTEM INFORMASI AKADEMIK TERPADU
            </p>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzWnQfAM6ManP39n_jk07IpeahocJXW0nyFGJSEJ3B4YR3LPR-pLFnt6gKsXLI3FtLf/exec;

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submit-btn');
            const errorMsg = document.getElementById('error-msg');
            const nisInput = document.getElementById('nis').value.trim();

            submitBtn.disabled = true;
            submitBtn.innerText = 'MEMVERIFIKASI...';
            errorMsg.classList.add('hidden');

            try {
                const response = await fetch(`${API_URL}?sheet=Siswa`);
                const rawData = await response.json();
                
                const dataSiswa = rawData.map(item => {
                    let normalized = {};
                    for (let key in item) {
                        normalized[key.toLowerCase().trim()] = item[key];
                    }
                    return normalized;
                });

                const user = dataSiswa.find(u => String(u.nis).trim() === nisInput);

                if (user) {
                    localStorage.setItem('user_login', JSON.stringify(user));
                    submitBtn.innerText = 'BERHASIL!';
                    setTimeout(() => {
                        window.location.href = 'dashboard-siswa.html';
                    }, 500);
                } else {
                    throw new Error("NOT_FOUND");
                }
            } catch (error) {
                errorMsg.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.innerText = 'MASUK KE DASHBOARD';
                errorMsg.innerText = error.message === "NOT_FOUND" ? "NIS TIDAK DITEMUKAN!" : "GANGGUAN KONEKSI SERVER";
            }
        });
    </script>
</body>
</html>
