<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Siswa | SMPN 110 Jakarta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #1A2A6C;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-[#1A2A6C] min-h-screen flex items-center justify-center p-6 relative">

    <div class="absolute top-0 left-0 w-64 h-64 bg-yellow-400 rounded-full blur-[100px] opacity-20 -translate-x-1/2 -translate-y-1/2"></div>
    <div class="absolute bottom-0 right-0 w-64 h-64 bg-blue-400 rounded-full blur-[100px] opacity-20 translate-x-1/2 translate-y-1/2"></div>

    <div class="w-full max-w-md z-10">
        <div class="text-center mb-10">
            <div class="bg-white inline-block p-5 rounded-[30px] shadow-2xl mb-5 transform -rotate-3">
                <span class="text-4xl">🎓</span>
            </div>
            <h1 class="text-4xl font-black text-white tracking-tighter italic uppercase">
                Portal <span class="text-yellow-400">Siswa</span>
            </h1>
            <p class="text-blue-200 text-xs font-bold mt-2 uppercase tracking-[0.2em]">SMP Negeri 110 Jakarta</p>
        </div>

        <div class="glass-card p-10 rounded-[45px] shadow-2xl">
            <form id="loginForm" class="space-y-8">
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-3 ml-2">Nomor Induk Siswa (NIS)</label>
                    <input type="number" id="nisInput" required placeholder="Masukkan NIS Anda..." 
                        class="w-full px-8 py-5 bg-white border-2 border-slate-100 rounded-3xl focus:outline-none focus:ring-4 focus:ring-yellow-400 transition-all font-black text-navy text-xl text-center placeholder:text-slate-300 placeholder:font-normal">
                </div>

                <button type="submit" id="submitBtn"
                    class="w-full py-5 bg-[#1A2A6C] text-white font-black uppercase tracking-widest rounded-[25px] shadow-2xl hover:bg-yellow-500 hover:text-black transition-all duration-300 transform active:scale-95 flex items-center justify-center">
                    <span>Masuk Sekarang</span>
                </button>
            </form>

            <div class="mt-10 pt-8 border-t border-slate-200/50 text-center">
                <a href="index.html" class="text-xs font-bold text-slate-500 hover:text-navy transition-all uppercase tracking-tighter">
                    ← Kembali ke Beranda
                </a>
            </div>
        </div>
    </div>

    <script>
        // URL API dari Google Apps Script kamu
        const API_BASE = 'https://script.google.com/macros/s/AKfycbxRC4tISO2LFTfu9YlwdUIu9I4LJOOwzkDtPcrkZ_lU-fUaUJBgQbU_BIDK9t9wqkjl/exec';

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const nisInput = document.getElementById('nisInput').value.trim();
            const btn = document.getElementById('submitBtn');
            const btnText = btn.querySelector('span');

            // Loading state
            btn.disabled = true;
            btnText.innerHTML = '<div class="loader"></div> Memproses...';

            try {
                // Ambil data dari tab 'Siswa' sesuai screenshot kamu
                const response = await fetch(`${API_BASE}?sheet=Siswa`);
                const dataSiswa = await response.json();

                // Cari NIS di kolom 'nis' (pastikan di Google Sheets nama kolomnya 'nis' huruf kecil)
                const user = dataSiswa.find(s => s.nis.toString() === nisInput);

                if (user) {
                    btnText.innerHTML = '✅ Berhasil!';
                    btn.classList.replace('bg-[#1A2A6C]', 'bg-green-500');

                    // Simpan data login ke memori browser
                    localStorage.setItem('user_login', JSON.stringify(user));

                    // Arahkan ke Halaman Khusus Siswa (Dashboard)
                    setTimeout(() => {
                        window.location.href = 'dashboard-siswa.html'; 
                    }, 800);

                } else {
                    alert("NIS tidak ditemukan! Pastikan nomor sudah benar atau hubungi admin sekolah.");
                    btn.disabled = false;
                    btnText.innerText = 'Masuk Sekarang';
                }

            } catch (error) {
                console.error("Login Error:", error);
                alert("Gagal terhubung ke database. Periksa koneksi internet.");
                btn.disabled = false;
                btnText.innerText = 'Masuk Sekarang';
            }
        });
    </script>
</body>
</html>
