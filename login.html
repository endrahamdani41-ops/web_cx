<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Siswa | SMPN 110 Jakarta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="glass-card w-full max-w-[400px] rounded-[40px] shadow-2xl overflow-hidden p-10 md:p-12 transform transition-all">
        
        <div class="text-center mb-10">
            <div class="w-20 h-20 bg-yellow-400 rounded-3xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-yellow-400/20">
                <span class="text-4xl">🎓</span>
            </div>
            <h2 class="text-3xl font-black text-slate-800 tracking-tighter italic uppercase leading-none">
                Login <span class="text-indigo-600">Siswa</span>
            </h2>
            <p class="text-slate-400 text-[10px] mt-3 font-bold tracking-[0.2em] uppercase">Portal Akademik 110</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
 
                <input type="text" id="nis" required 
                    placeholder="Masukkan NIS Anda"
                    class="w-full px-6 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all text-sm font-semibold text-slate-700 text-center tracking-widest">
            </div>

            <button type="submit" 
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-2xl transition-all shadow-xl shadow-indigo-600/20 active:scale-95 uppercase tracking-widest text-xs mt-2">
                Masuk Ke Dashboard
            </button>
        </form>

        <div class="mt-10 text-center">
            <a href="index.html" class="text-slate-400 hover:text-indigo-600 text-[10px] font-bold uppercase tracking-widest transition-colors">
                ← Kembali ke Beranda
            </a>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxRC4tISO2LFTfu9YlwdUIu9I4LJOOwzkDtPcrkZ_lU-fUaUJBgQbU_BIDK9t9wqkjl/exec';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = e.target.querySelector('button');
            const nis = document.getElementById('nis').value;

            // Efek Loading
            submitBtn.disabled = true;
            submitBtn.innerText = 'MENGECEK DATA...';
            submitBtn.classList.add('opacity-50');

            try {
                // Fetch data siswa dari Google Sheets
                const response = await fetch(`${API_URL}?sheet=Siswa`);
                const data = await response.json();
                
                // Cari siswa berdasarkan NIS saja
                const user = data.find(u => u.nis == nis);

                if (user) {
                    // Simpan data user ke localStorage
                    localStorage.setItem('user_login', JSON.stringify(user));
                    window.location.href = 'dashboard-siswa.html';
                } else {
                    alert('NIS tidak ditemukan! Pastikan NIS sudah benar.');
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'MASUK KE DASHBOARD';
                    submitBtn.classList.remove('opacity-50');
                }
            } catch (error) {
                alert('Gagal terhubung ke server. Periksa koneksi internet Anda.');
                submitBtn.disabled = false;
                submitBtn.innerText = 'MASUK KE DASHBOARD';
                submitBtn.classList.remove('opacity-50');
            }
        });
    </script>
</body>
</html>
