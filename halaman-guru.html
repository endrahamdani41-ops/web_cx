<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Guru | SMPN 110 Jakarta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617; 
            color: #f8fafc;
            background-image: radial-gradient(circle at top right, #1e293b, #020617);
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            border-color: rgba(234, 179, 8, 0.4);
            transform: translateY(-8px);
        }

        .photo-container:hover .photo-overlay { opacity: 1; }

        .photo-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            cursor: pointer;
            border-radius: 42px;
        }

        .shimmer {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="min-h-screen antialiased">



    <main class="container mx-auto px-6 py-10 max-w-6xl">
        
        <div class="flex flex-col md:flex-row items-center gap-10 mb-16">
            <div class="shrink-0 relative photo-container">
                <div class="p-3 bg-slate-800 rounded-[50px] shadow-2xl border border-white/5">
                    <div id="photo-box" class="w-44 h-44 md:w-52 md:h-52 bg-slate-900 rounded-[42px] overflow-hidden border-2 border-slate-700 relative shimmer">
                        <img id="guru-foto" src="" alt="Profil" class="w-full h-full object-cover opacity-0 transition-opacity duration-500">
                        <label for="upload-foto" class="photo-overlay">
                            <div class="text-center">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-8 h-8 text-white mx-auto mb-1">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z" />
                                </svg>
                                <span class="text-[10px] font-black uppercase text-white tracking-widest">Update Foto</span>
                            </div>
                        </label>
                        <input type="file" id="upload-foto" class="hidden" accept="image/*" onchange="handleFotoUpload(this)">
                    </div>
                </div>
            </div>
           <button onclick="logoutSiswa()" class="absolute top-8 right-8 z-20 p-3 bg-red-500/10 hover:bg-red-500 rounded-2xl group transition-all duration-300" title="Keluar">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-red-500 group-hover:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
            </button>
            <div class="text-center md:text-left">
                <h2 class="text-[10px] font-black uppercase tracking-[0.4em] text-yellow-500 mb-2 italic">Dashboard Guru</h2>
                <h1 id="guru-nama" class="text-3xl md:text-4xl font-black text-white mb-3 tracking-tighter uppercase italic">...</h1>
                <div class="flex flex-wrap justify-center md:justify-start gap-3">
                    <span id="guru-nip" class="px-4 py-2 bg-slate-800 rounded-full text-[10px] font-bold text-slate-400 border border-slate-700 uppercase tracking-widest">NIP: ---</span>
                    <span id="guru-mapel" class="px-4 py-2 bg-yellow-500/10 rounded-full text-[10px] font-bold text-yellow-500 border border-yellow-500/20 uppercase tracking-widest italic">---</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <a href="guru-input-nilai.html" class="glass-card p-8 rounded-[40px] flex flex-col gap-6 group">
                <div class="w-16 h-16 bg-yellow-500 rounded-2xl flex items-center justify-center text-3xl shadow-lg shadow-yellow-500/20 group-hover:rotate-6 transition-transform">📝</div>
                <div>
                    <h3 class="text-xl font-black text-white mb-2 uppercase italic tracking-tighter">Input Nilai</h3>
                    <p class="text-slate-400 text-sm font-medium leading-relaxed">Kelola nilai harian, UTS, dan UAS siswa.</p>
                </div>
            </a>
            
            <div onclick="bukaEizin()" class="glass-card p-8 rounded-[40px] flex flex-col gap-6 group cursor-pointer">
                <div class="w-16 h-16 bg-emerald-500 rounded-2xl flex items-center justify-center text-3xl shadow-lg shadow-emerald-500/20 group-hover:scale-110 transition-transform">📋</div>
                <div>
                    <h3 class="text-xl font-black text-white mb-2 uppercase italic tracking-tighter">E-Izin Siswa</h3>
                    <p class="text-slate-400 text-sm font-medium leading-relaxed">Pantau absensi dan surat izin digital siswa.</p>
                </div>
            </div>

            <div onclick="logout()" class="glass-card p-8 rounded-[40px] flex flex-col gap-6 group cursor-pointer">
                <div class="w-16 h-16 bg-red-500 rounded-2xl flex items-center justify-center text-3xl shadow-lg shadow-red-500/20 group-hover:-rotate-6 transition-transform">🚪</div>
                <div>
                    <h3 class="text-xl font-black text-white mb-2 uppercase italic tracking-tighter">Keluar</h3>
                    <p class="text-slate-400 text-sm font-medium leading-relaxed">Selesaikan sesi dan amankan akun Anda.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwdW39-guY0CZCEntxIrt1135EJPdvyZzfIMGVx9LUApaY6REBSmxJMGjITQk2edMrW/exec';

        async function initDashboard() {
            const session = localStorage.getItem('user_login') || localStorage.getItem('userGuru');
            if (!session) { window.location.replace("index.html"); return; }
            
            const user = JSON.parse(session);
            const nipUser = (user.nip || user.NIP || "").toString();
            const namaUser = user.nama || user.NAMA;

            document.getElementById('guru-nama').innerText = namaUser;
            document.getElementById('guru-nip').innerText = "NIP: " + (nipUser || "---");
            document.getElementById('guru-mapel').innerText = (user.mapel || user.MAPEL || "Staff").toUpperCase();

            const imgElement = document.getElementById('guru-foto');
            const photoBox = document.getElementById('photo-box');

            imgElement.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(namaUser)}&background=334155&color=fff&size=256`;
            imgElement.style.opacity = "1";

            try {
                const response = await fetch(`${API_URL}?sheet=Guru&t=${Date.now()}`);
                const allGuru = await response.json();
                const myData = allGuru.find(g => (g.nip || g.NIP || "").toString() === nipUser || (g.nama || g.NAMA || "").toLowerCase() === namaUser.toLowerCase());

                if (myData && (myData.foto || myData.foto_base64 || myData.FOTO)) {
                    imgElement.src = myData.foto || myData.foto_base64 || myData.FOTO;
                }
                photoBox.classList.remove('shimmer');
            } catch (e) { 
                photoBox.classList.remove('shimmer');
            }
        }

        // FUNGSI NAVIGASI LANGSUNG KE E-IZIN.HTML
        function bukaEizin() {
            const user = JSON.parse(localStorage.getItem('user_login') || localStorage.getItem('userGuru'));
            // Ambil kode/password untuk auto login
            const authCode = user.password || user.KODE || "";
            // Navigasi ke eizin.html dengan parameter auth
            window.location.href = `eizin.html?auth=${authCode}`;
        }

        async function handleFotoUpload(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function(e) {
                const img = new Image();
                img.src = e.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    let width = img.width, height = img.height, maxSize = 400;
                    if (width > height) { if (width > maxSize) { height *= maxSize / width; width = maxSize; } }
                    else { if (height > maxSize) { width *= maxSize / height; height = maxSize; } }
                    canvas.width = width; canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    executeUpload(canvas.toDataURL('image/jpeg', 0.6));
                };
            };
        }

        async function executeUpload(base64String) {
            const user = JSON.parse(localStorage.getItem('user_login') || localStorage.getItem('userGuru'));
            Swal.fire({ title: 'Mengunggah...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'update_foto_guru', nama: user.nama || user.NAMA, foto_base64: base64String })
                });
                if ((await response.text()).trim() === "Berhasil") {
                    document.getElementById('guru-foto').src = base64String;
                    Swal.fire({ icon: 'success', title: 'Berhasil', timer: 1500, showConfirmButton: false });
                }
            } catch (e) { Swal.fire('Gagal', 'Koneksi bermasalah', 'error'); }
        }

        function logout() {
            Swal.fire({
                title: 'Keluar?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'Ya, Keluar'
            }).then((res) => {
                if (res.isConfirmed) {
                    localStorage.clear();
                    window.location.replace("index.html");
                }
            });
        }

        window.onload = initDashboard;
    </script>
</body>
</html>
