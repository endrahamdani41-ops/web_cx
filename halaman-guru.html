<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Guru | SMPN 110 Jakarta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617; 
            color: #f8fafc;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            border-color: rgba(234, 179, 8, 0.4);
            transform: translateY(-8px);
            background: rgba(30, 41, 59, 0.8);
        }

        /* ANIMASI LINGKARAN HIJAU BERKEDIP (STATUS ONLINE) */
        .status-online {
            animation: pulse-emerald 2s infinite;
        }

        @keyframes pulse-emerald {
            0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 12px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .fade-in { 
            animation: fadeIn 0.8s ease-out forwards; 
        }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>
<body class="min-h-screen">

    <nav class="bg-slate-900/80 backdrop-blur-md py-4 px-6 sticky top-0 z-50 border-b border-slate-800">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-yellow-500 p-2 rounded-xl">
                    <span class="text-sm">👨‍🏫</span>
                </div>
                <div>
                    <span class="font-extrabold uppercase tracking-tighter italic text-xs block text-white">Dashboard Guru</span>
                    <span class="text-slate-500 font-bold text-[9px] tracking-widest uppercase">SMPN 110 Jakarta</span>
                </div>
            </div>
            <button onclick="logout()" class="text-[10px] font-black uppercase tracking-widest text-red-500 hover:text-white hover:bg-red-500 px-4 py-2 rounded-full border border-red-500/30 transition-all">Logout</button>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-10 max-w-6xl">
        
        <div class="flex flex-col md:flex-row items-center gap-10 mb-16 fade-in">
            <div class="shrink-0 relative">
                <div class="p-3 bg-slate-800 rounded-[50px] shadow-2xl border border-white/5">
                    <div class="w-44 h-44 md:w-52 md:h-52 bg-slate-900 rounded-[42px] overflow-hidden border-2 border-slate-700">
                        <img id="guru-foto" src="" alt="Profil" class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-500">
                    </div>
                </div>
                <div class="absolute bottom-6 right-6 bg-emerald-500 w-7 h-7 rounded-full border-4 border-slate-900 status-online z-10"></div>
            </div>

            <div class="text-center md:text-left">
                <h2 class="text-[10px] font-black uppercase tracking-[0.4em] text-yellow-500 mb-2">Selamat Datang !</h2>
                <h1 id="guru-nama" class="text-3xl md:text-4xl font-black text-white mb-3 tracking-tighter uppercase">...</h1>
                <div class="flex flex-wrap justify-center md:justify-start gap-3">
                    <span id="guru-nip" class="px-4 py-2 bg-slate-800 rounded-full text-[10px] font-bold text-slate-400 border border-slate-700 uppercase tracking-widest">NIP: ---</span>
                    <span id="guru-mapel" class="px-4 py-2 bg-yellow-500/10 rounded-full text-[10px] font-bold text-yellow-500 border border-yellow-500/20 uppercase tracking-widest">MAPEL: ---</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 fade-in" style="animation-delay: 0.2s;">
            <a href="guru-input-nilai.html" class="glass-card p-8 rounded-[40px] flex flex-col gap-6 group">
                <div class="w-16 h-16 bg-yellow-500 rounded-2xl flex items-center justify-center text-3xl shadow-lg shadow-yellow-500/20 group-hover:rotate-6 transition-transform">📝</div>
                <div>
                    <h3 class="text-xl font-black text-white mb-2">Input Nilai</h3>
                    <p class="text-slate-400 text-sm font-medium leading-relaxed">Input nilai PH, UTS, dan UAS massal langsung ke database.</p>
                </div>
            </a>
            
            <div class="glass-card p-8 rounded-[40px] flex flex-col gap-6 group cursor-pointer opacity-60">
                <div class="w-16 h-16 bg-blue-500 rounded-2xl flex items-center justify-center text-3xl">📅</div>
                <div>
                    <h3 class="text-xl font-black text-white mb-2">Jadwal</h3>
                    <p class="text-slate-400 text-sm font-medium">Fitur jadwal mengajar sedang dalam pengembangan.</p>
                </div>
            </div>

            <div class="glass-card p-8 rounded-[40px] flex flex-col gap-6 group cursor-pointer opacity-60">
                <div class="w-16 h-16 bg-emerald-500 rounded-2xl flex items-center justify-center text-3xl">⚙️</div>
                <div>
                    <h3 class="text-xl font-black text-white mb-2">Akun</h3>
                    <p class="text-slate-400 text-sm font-medium">Pengaturan profil dan ganti kata sandi.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzWnQfAM6ManP39n_jk07IpeahocJXW0nyFGJSEJ3B4YR3LPR-pLFnt6gKsXLI3FtLf/exec'; 

        async function initDashboard() {
            const sessionData = localStorage.getItem('user_login') || localStorage.getItem('userGuru');
            if (!sessionData) { window.location.replace("index.html"); return; }
            
            const user = JSON.parse(sessionData);
            const nipGuru = user.nip || user.NIP;
            const namaGuru = user.nama || user.NAMA;

            // 1. Tampilkan info teks dasar segera
            document.getElementById('guru-nama').innerText = namaGuru;
            document.getElementById('guru-nip').innerText = "NIP: " + (nipGuru || "---");
            document.getElementById('guru-mapel').innerText = user.mapel || user.MATA_PELAJARAN;

            const imgElement = document.getElementById('guru-foto');

            // 2. LOGIKA ANTI LOADING (Ambil dari LocalStorage jika ada)
            const cachedFoto = localStorage.getItem(`foto_guru_${nipGuru}`);
            
            if (cachedFoto) {
                imgElement.src = cachedFoto;
            } else {
                // Gunakan inisial jika belum ada cache
                imgElement.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(namaGuru)}&background=334155&color=fff&size=256`;
            }

            // 3. Update foto dari Sheets di background (agar cache selalu terbaru)
            try {
                const response = await fetch(`${API_URL}?sheet=Guru&t=${Date.now()}`);
                const allGuru = await response.json();
                const profil = allGuru.find(g => (g.nip || g.NIP) == nipGuru);

                if (profil && (profil.foto || profil.FOTO)) {
                    const latestFoto = profil.foto || profil.FOTO;
                    
                    // Simpan link foto ke LocalStorage
                    localStorage.setItem(`foto_guru_${nipGuru}`, latestFoto);
                    
                    // Ganti gambar jika link berubah
                    if (imgElement.src !== latestFoto) {
                        imgElement.src = latestFoto;
                    }
                }
            } catch (e) {
                console.error("Gagal sinkronisasi foto:", e);
            }
        }

        function logout() {
            if(confirm("Keluar dari sistem?")) {
                localStorage.clear();
                window.location.replace("index.html");
            }
        }

        window.onload = initDashboard;
    </script>
</body>
</html>
