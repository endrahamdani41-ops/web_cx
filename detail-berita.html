<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#eab308">
<link rel="apple-touch-icon" href="icon-192.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Berita | SMPN 110 Jakarta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617; /* Dark Navy sesuai index */
            color: #f8fafc;
        }

        /* Styling area konten berita agar rapi */
        .content-area p { 
            margin-bottom: 1.5rem; 
            line-height: 1.8; 
            color: #cbd5e1; /* Slate-300 */
        }

        .fade-in { 
            animation: fadeIn 0.8s ease-out forwards; 
        }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* Glassmorphism Effect untuk container */
        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="min-h-screen">

    <div id="header-placeholder"></div>

    <main class="pt-32 pb-20 container mx-auto px-6 max-w-4xl">
        

        <div id="loading-detail" class="text-center py-20">
            <div class="animate-spin inline-block w-8 h-8 border-[3px] border-yellow-500 border-t-transparent rounded-full mb-4"></div>
            <p class="text-slate-500 font-black uppercase text-[10px] tracking-widest animate-pulse">Sinkronisasi Data...</p>
        </div>

        <article id="detail-content" class="hidden fade-in">
            <header class="text-center mb-12">
                <div class="flex flex-col items-center gap-4 mb-6">
                    <span id="det-kategori" class="px-5 py-2 rounded-full text-[9px] font-black uppercase tracking-[0.3em] shadow-xl">
                        KATEGORI
                    </span>
                    <span id="det-tanggal" class="text-slate-500 text-[10px] font-bold uppercase italic tracking-widest">
                        📅 -- -- ----
                    </span>
                </div>

                <h1 id="det-judul" class="text-3xl md:text-6xl font-black text-white uppercase italic tracking-tighter leading-[1.1] mb-8">
                    ...
                </h1>
            </header>

            <div class="rounded-[45px] overflow-hidden shadow-2xl bg-slate-900 mb-12 border border-white/5 p-2">
                <img id="det-foto" src="" class="w-full h-auto object-cover rounded-[38px]" alt="Cover Berita">
            </div>

            <div class="glass-card p-8 md:p-12 rounded-[50px]">
                <div id="det-isi" class="content-area text-lg md:text-xl italic font-medium border-l-8 border-yellow-500 pl-8 md:pl-10 py-2">
                    </div>
            </div>
        </article>

    </main>

    <div id="footer-placeholder"></div>

    <script>
        const API_BASE = 'https://script.google.com/macros/s/AKfycbw8RRnxDbWemcm2XN5FsXsz27-RWzcIA0vnTVM374YJdNFJf5dl5OGsRCD5RnkC3_ND/exec';

        async function includeLayout() {
            const sections = [{ id: 'header-placeholder', file: 'header.html' }, { id: 'footer-placeholder', file: 'footer.html' }];
            for (const s of sections) {
                try {
                    const r = await fetch(s.file);
                    if (r.ok) document.getElementById(s.id).innerHTML = await r.text();
                } catch (e) { console.warn("Layout error."); }
            }
        }

        function fixUrl(url) {
            if (!url) return 'https://via.placeholder.com/1200x800?text=Gambar+Tidak+Tersedia';
            if (url.includes('drive.google.com')) {
                const id = url.split('/d/')[1]?.split('/')[0] || url.split('id=')[1];
                return `https://drive.google.com/uc?export=view&id=${id}`;
            }
            return url;
        }

        function getKategoriStyle(kat) {
            const kategori = (kat || "").toLowerCase().trim();
            if (kategori === 'prestasi') return 'bg-yellow-500 text-slate-950';
            if (kategori === 'kegiatan') return 'bg-blue-600 text-white';
            if (kategori === 'pengumuman') return 'bg-red-600 text-white';
            return 'bg-slate-800 text-slate-300';
        }

        function formatIndoDate(dateStr) {
            const date = new Date(dateStr);
            return isNaN(date.getTime()) ? dateStr : date.toLocaleDateString('id-ID', { 
                day: 'numeric', 
                month: 'long', 
                year: 'numeric' 
            });
        }

        async function loadDetailBerita() {
            const urlParams = new URLSearchParams(window.location.search);
            const beritaId = urlParams.get('id');
            const beritaJudul = urlParams.get('judul');

            if (!beritaId && !beritaJudul) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const res = await fetch(`${API_BASE}?sheet=Berita&t=${Date.now()}`);
                const data = await res.json();
                
                let berita;
                if (beritaId) {
                    berita = data[parseInt(beritaId)];
                } else {
                    berita = data.find(n => (n.judul || n.JUDUL) === decodeURIComponent(beritaJudul));
                }

                if (berita) {
                    const judul = berita.judul || berita.JUDUL;
                    const kategori = berita.kategori || berita.KATEGORI || "Berita";
                    const isi = berita.isi_berita || berita.ISI_BERITA || berita.ringkasan || berita.RINGKASAN;
                    const tanggal = berita.tanggal || berita.TANGGAL;
                    const foto = berita.url_foto || berita.URL_FOTO;

                    document.getElementById('det-judul').innerText = judul;
                    document.getElementById('det-tanggal').innerText = `📅 ${formatIndoDate(tanggal)}`;
                    document.getElementById('det-foto').src = fixUrl(foto);
                    document.getElementById('det-isi').innerHTML = `<p>${isi.replace(/\n/g, '</p><p>')}</p>`;
                    
                    const katTag = document.getElementById('det-kategori');
                    katTag.innerText = kategori;
                    katTag.className = `px-5 py-2 rounded-full text-[9px] font-black uppercase tracking-[0.3em] shadow-xl ${getKategoriStyle(kategori)}`;

                    document.getElementById('loading-detail').classList.add('hidden');
                    document.getElementById('detail-content').classList.remove('hidden');
                    document.title = `${judul} | SMPN 110 Jakarta`;
                }
            } catch (e) {
                console.error("Error:", e);
                document.getElementById('loading-detail').innerHTML = `<p class="text-red-500 font-bold">Gagal memuat berita. Periksa koneksi Anda.</p>`;
            }
        }

        includeLayout();
        loadDetailBerita();
    </script>
</body>
</html>
