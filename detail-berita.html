<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Berita | SMPN 110 Jakarta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .content-area p { margin-bottom: 1.5rem; line-height: 1.8; color: #475569; }
    </style>
</head>
<body class="bg-gray-50 text-slate-900">

    <div id="header-placeholder"></div>

    <main class="pt-32 pb-20 container mx-auto px-6">
        <div class="max-w-4xl mx-auto">
            
            <a href="berita.html" class="inline-flex items-center gap-2 text-[#1A2A6C] font-bold text-sm uppercase tracking-widest mb-8 hover:text-yellow-500 transition-colors">
                ← Kembali ke Berita
            </a>

            <div id="loading-detail" class="text-center py-20">
                <div class="animate-spin inline-block w-10 h-10 border-4 border-yellow-400 border-t-transparent rounded-full mb-4"></div>
                <p class="text-slate-400 font-bold uppercase text-[10px] tracking-widest">Memuat Isi Berita...</p>
            </div>

            <div id="detail-content" class="hidden">
                <div class="flex items-center gap-4 mb-6">
                    <span id="det-kategori" class="px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-md"></span>
                    <span id="det-tanggal" class="text-slate-400 text-[10px] font-bold uppercase italic tracking-widest"></span>
                </div>

                <h1 id="det-judul" class="text-4xl md:text-6xl font-black text-[#1A2A6C] uppercase italic tracking-tighter leading-none mb-10"></h1>

                <div class="rounded-[40px] overflow-hidden shadow-2xl bg-white mb-12 border-8 border-white">
                    <img id="det-foto" src="" class="w-full h-auto object-cover" alt="Cover Berita">
                </div>

                <div id="det-isi" class="content-area text-lg md:text-xl italic font-medium border-l-4 border-yellow-400 pl-8 md:pl-12 py-2">
                    </div>
            </div>

        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        const API_BASE = 'https://script.google.com/macros/s/AKfycbwP4Z1XfgCA2s_HxcUeODJ60xr-GY7zXv6guUNL63w3gGlV00YOOTsrH3Op5a4OK83Z/exec';

        async function includeLayout() {
            try {
                const [hRes, fRes] = await Promise.all([fetch('header.html'), fetch('footer.html')]);
                document.getElementById('header-placeholder').innerHTML = await hRes.text();
                document.getElementById('footer-placeholder').innerHTML = await fRes.text();
            } catch (err) { console.warn("Layout tidak ditemukan."); }
        }

        function fixUrl(url) {
            if (!url) return 'https://via.placeholder.com/1200x800?text=No+Image';
            if (url.includes('drive.google.com')) {
                const id = url.split('/d/')[1]?.split('/')[0] || url.split('id=')[1];
                return `https://drive.google.com/uc?export=view&id=${id}`;
            }
            return url;
        }

        function getKategoriColor(kat) {
            if (!kat) return 'bg-slate-800 text-white';
            const kategori = kat.toLowerCase().trim();
            if (kategori === 'prestasi') return 'bg-yellow-400 text-black';
            if (kategori === 'kegiatan') return 'bg-blue-600 text-white';
            if (kategori === 'pengumuman') return 'bg-red-500 text-white';
            return 'bg-slate-800 text-white';
        }

        function formatIndoDate(dateStr) {
            const date = new Date(dateStr);
            return isNaN(date.getTime()) ? dateStr : date.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        async function loadDetailBerita() {
            // Ambil ID dari URL (?id=...)
            const urlParams = new URLSearchParams(window.location.search);
            const beritaId = urlParams.get('id');

            if (!beritaId) {
                window.location.href = 'berita.html';
                return;
            }

            try {
                const res = await fetch(`${API_BASE}?sheet=Berita`);
                const data = await res.json();
                
                // Cari berita berdasarkan baris (index) atau kolom ID jika ada
                // Di sini kita asumsikan ID sesuai dengan urutan data
                const berita = data[parseInt(beritaId)];

                if (berita) {
                    document.getElementById('det-judul').innerText = berita.judul;
                    document.getElementById('det-tanggal').innerText = `📅 ${formatIndoDate(berita.tanggal)}`;
                    document.getElementById('det-foto').src = fixUrl(berita.url_foto);
                    document.getElementById('det-isi').innerHTML = berita.isi_berita || berita.ringkasan;
                    
                    const katTag = document.getElementById('det-kategori');
                    katTag.innerText = berita.kategori;
                    katTag.className = `px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-md ${getKategoriColor(berita.kategori)}`;

                    // Tampilkan konten, sembunyikan loading
                    document.getElementById('loading-detail').classList.add('hidden');
                    document.getElementById('detail-content').classList.remove('hidden');
                    document.title = `${berita.judul} | SMPN 110 Jakarta`;
                }
            } catch (e) {
                console.error("Gagal memuat detail:", e);
            }
        }

        includeLayout();
        loadDetailBerita();
    </script>
</body>
</html>
