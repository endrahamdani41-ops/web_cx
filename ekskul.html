<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#eab308">
<link rel="apple-touch-icon" href="icon-192.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekskul - SMPN 110 Jakarta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: #020617; /* Dark Navy sesuai index */
            color: #f8fafc;
        }

        /* Card Style Dark Mode */
        .dark-card {
            background: rgba(30, 41, 59, 0.7); /* Slate 800 Transparan */
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .dark-card:hover {
            transform: translateY(-10px);
            border-color: rgba(234, 179, 8, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .filter-btn {
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8;
            transition: all 0.3s ease;
        }

        .filter-btn.active {
            background-color: #eab308;
            color: #020623;
            border-color: #eab308;
            font-weight: 800;
            box-shadow: 0 0 15px rgba(234, 179, 8, 0.3);
        }

        #header-placeholder { min-height: 0; }
        #container-foto-prestasi { min-height: 50vh; }
    </style>
</head>
<body class="text-slate-200">

    <div id="header-placeholder"></div>

    <header class="relative py-20 text-center overflow-hidden bg-[#020617]">
        <div class="relative z-10 container mx-auto px-6">
            <h1 class="text-4xl md:text-6xl font-black italic centralized tracking-tighter mb-2 text-white">
                Ekstrakurikuler
            </h1>
            <div class="h-1.5 w-24 bg-yellow-500 mx-auto mb-4 rounded-full shadow-lg shadow-yellow-500/20"></div>
            <p class="text-yellow-500 font-bold tracking-[0.3em] text-[10px] md:text-xs centralized opacity-90">
                Wadah Kreativitas & Prestasi Siswa
            </p>
        </div>
    </header>

    <section class="container mx-auto px-6 -mt-6 relative z-20">
        <div class="flex flex-wrap justify-center gap-3 bg-slate-900/50 backdrop-blur-md p-4 rounded-3xl border border-white/5 shadow-2xl">
            <button onclick="filterKategori('Semua', this)" class="filter-btn active px-6 py-2 rounded-2xl text-[10px] centralized tracking-widest hover:border-yellow-500">Semua</button>
            <button onclick="filterKategori('Pencak Silat', this)" class="filter-btn px-6 py-2 rounded-2xl text-[10px] centralized tracking-widest hover:border-yellow-500">Pencak Silat</button>
            <button onclick="filterKategori('Drumband', this)" class="filter-btn px-6 py-2 rounded-2xl text-[10px] centralized tracking-widest hover:border-yellow-500">Drumband</button>
            <button onclick="filterKategori('Tari', this)" class="filter-btn px-6 py-2 rounded-2xl text-[10px] centralized tracking-widest hover:border-yellow-500">Tari</button>
            <button onclick="filterKategori('Basket', this)" class="filter-btn px-6 py-2 rounded-2xl text-[10px] centralized tracking-widest hover:border-yellow-500">Basket</button>
            <button onclick="filterKategori('Paskibra', this)" class="filter-btn px-6 py-2 rounded-2xl text-[10px] centralized tracking-widest hover:border-yellow-500">Paskibra</button>
            <button onclick="filterKategori('Futsal', this)" class="filter-btn px-6 py-2 rounded-2xl text-[10px] centralized tracking-widest hover:border-yellow-500">Futsal</button>
        </div>
    </section>

    <main class="container mx-auto px-6 py-20">
        <div id="container-foto-prestasi" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
            </div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        const API_BASE = 'https://script.google.com/macros/s/AKfycbw8RRnxDbWemcm2XN5FsXsz27-RWzcIA0vnTVM374YJdNFJf5dl5OGsRCD5RnkC3_ND/exec';
        let semuaData = [];

        async function includeLayout() {
            try {
                const [hRes, fRes] = await Promise.all([fetch('header.html'), fetch('footer.html')]);
                document.getElementById('header-placeholder').innerHTML = await hRes.text();
                document.getElementById('footer-placeholder').innerHTML = await fRes.text();
            } catch(e) { console.error("Gagal memuat layout."); }
        }

        function fixUrl(url) {
            if (!url) return 'https://via.placeholder.com/600x600?text=No+Photo';
            if (url.includes('drive.google.com')) {
                const id = url.split('/d/')[1]?.split('/')[0] || url.split('id=')[1];
                return `https://drive.google.com/uc?export=view&id=${id}`;
            }
            return url;
        }

        async function loadFotoPrestasi() {
            const cacheKey = 'cache_data_ekskul';
            const cachedData = localStorage.getItem(cacheKey);

            if (cachedData) {
                semuaData = JSON.parse(cachedData);
                displayFoto(semuaData);
            }

            try {
                const res = await fetch(`${API_BASE}?sheet=Prestasi`);
                const newData = await res.json();
                const reversedData = newData.reverse();
                
                if (JSON.stringify(reversedData) !== cachedData) {
                    localStorage.setItem(cacheKey, JSON.stringify(reversedData));
                    semuaData = reversedData;
                    displayFoto(semuaData);
                }
            } catch (e) {
                console.error("API Error");
            }
        }

        function displayFoto(data) {
            const container = document.getElementById('container-foto-prestasi');
            if(data.length === 0) {
                container.innerHTML = "<p class='col-span-full text-center text-slate-500 py-10 centralized tracking-widest font-bold'>Belum ada foto.</p>";
                return;
            }

            container.innerHTML = data.map(p => `
                <div class="dark-card rounded-[35px] overflow-hidden flex flex-col group">
                    <div class="relative aspect-square overflow-hidden bg-slate-950">
                        <img src="${fixUrl(p.url_foto)}" 
                             class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110 opacity-80 group-hover:opacity-100" 
                             alt="${p.judul}">
                        <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-transparent to-transparent opacity-60"></div>
                    </div>
                    <div class="p-5 text-center">
                        <h3 class="font-black text-white text-[11px] md:text-[13px] centralized leading-tight mb-2 truncate px-2 italic tracking-tight">
                            ${p.judul || 'Aktivitas Siswa'}
                        </h3>
                        <div class="h-0.5 w-6 bg-yellow-500/40 mx-auto mb-2"></div>
                        <p class="text-[9px] text-yellow-500 font-extrabold centralized tracking-[0.2em] opacity-80">${p.kategori || 'Kegiatan'}</p>
                    </div>
                </div>
            `).join('');
        }

        function filterKategori(kategori, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            if (kategori === 'Semua') {
                displayFoto(semuaData);
            } else {
                const hasilFilter = semuaData.filter(item => 
                    item.kategori && item.kategori.toLowerCase() === kategori.toLowerCase()
                );
                displayFoto(hasilFilter);
            }
        }

        window.onload = () => {
            includeLayout();
            loadFotoPrestasi();
        };
    </script>
</body>
</html>
