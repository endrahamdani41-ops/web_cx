<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekskul | SMPN 110 Jakarta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617; 
            color: #f8fafc; 
        }
        
        /* Grid 2 Kolom */
        .ekskul-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        @media (max-width: 640px) {
            .ekskul-grid { gap: 0.75rem; }
        }

        .ekskul-card { 
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05); 
            background: #0f172a;
            transition: all 0.3s ease;
        }

        .photo-container {
            width: 100%;
            aspect-ratio: 4 / 3;
            overflow: hidden;
        }

        .img-fluid {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Skeleton Loading */
        .skeleton {
            background: #1e293b;
            border-radius: 20px;
            aspect-ratio: 4/3;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div id="header-placeholder"></div>

    <main class="pt-32 pb-20">
        <div class="container mx-auto px-6">
            <div class="text-center mb-16">
                 <h1 class="text-4xl md:text-5xl font-black italic text-white tracking-tighter">
                    Ekstra<span class="text-yellow-500">kurikuler</span>
                </h1>
                <div class="h-1.5 w-24 bg-yellow-500 mx-auto mt-4 rounded-full shadow-[0_0_15px_rgba(234,179,8,0.4)]"></div>
            </div>
        </div> <section class="py-10">
            <div class="container mx-auto px-4">
                <div id="ekskul-list" class="ekskul-grid">
                    <div class="skeleton"></div>
                    <div class="skeleton"></div>
                </div>
            </div>
        </section>
    </main> <div id="footer-placeholder"></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz22SMTpeUNN3SGduXJbMUJPVGtvsmMpP4TGV17nXWPiu0gLc8ZXFxjyJITKtV9Dq_H/exec"; 

        async function fetchEkskul() {
            const container = document.getElementById('ekskul-list');
            try {
                const response = await fetch(`${API_URL}?sheet=Ekskul`);
                const data = await response.json();
                if (!data || data.length === 0) {
                    container.innerHTML = `<p class="col-span-2 text-center text-slate-500 py-10">Belum ada data.</p>`;
                    return;
                }
                container.innerHTML = data.map(e => {
                    const foto = e.url_foto || e.foto || 'https://placehold.co/600x450/1e293b/facc15?text=NO+IMAGE';
                    const nama = e.nama_ekskul || e.nama || 'Ekskul';
                    const jadwal = e.jadwal || 'TBA';
                    return `
                    <div class="ekskul-card group">
                        <div class="photo-container">
                            <img src="${foto}" class="img-fluid group-hover:scale-110 transition-transform duration-500" alt="${nama}" onerror="this.src='https://placehold.co/600x450/1e293b/facc15?text=ERROR'">
                        </div>
                        <div class="p-4 flex justify-between items-center bg-slate-900/80">
                            <h3 class="font-black italic text-white uppercase text-xs md:text-sm tracking-tighter truncate pr-2">${nama}</h3>
                            <div class="flex items-center gap-1.5 bg-yellow-500/10 px-2 py-1 rounded-lg border border-yellow-500/20 flex-shrink-0">
                                <i data-lucide="calendar" class="text-yellow-500" size="12"></i>
                                <span class="text-yellow-500 font-extrabold uppercase text-[8px] md:text-[10px] whitespace-nowrap">${jadwal}</span>
                            </div>
                        </div>
                    </div>`;
                }).join('');
                lucide.createIcons();
            } catch (error) {
                container.innerHTML = `<p class="col-span-2 text-center text-red-500">Gagal mengambil data.</p>`;
            }
        }

        async function includeLayouts() {
            const sections = [
                { id: 'header-placeholder', file: 'header.html' }, 
                { id: 'footer-placeholder', file: 'footer.html' }
            ];
            for (const s of sections) {
                try {
                    const r = await fetch(s.file);
                    if (r.ok) document.getElementById(s.id).innerHTML = await r.text();
                } catch (e) {}
            }
        }

        window.onload = async () => {
            await includeLayouts();
            fetchEkskul();
        };
    </script>
</body>
</html>
