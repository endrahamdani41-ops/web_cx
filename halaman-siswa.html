<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Siswa | SMPN 110 Jakarta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617; /* Deep Slate Background */
            color: #f8fafc;
            overflow-x: hidden;
        }
        
        /* Glassmorphism Effect */
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .navy-gradient {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }

        .status-online {
            animation: pulse-elegant 2.5s infinite;
        }

        @keyframes pulse-elegant {
            0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.6); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 12px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .fade-in { 
            animation: fadeIn 0.8s ease-out forwards; 
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* Hover Effect untuk Menu */
        .menu-item {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .menu-item:hover {
            transform: translateY(-8px);
            background: rgba(51, 65, 85, 0.8);
            border-color: rgba(234, 179, 8, 0.4);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
<body class="min-h-screen pb-24">

    <script>
        const sessionData = localStorage.getItem('user_login') || localStorage.getItem('userSiswa');
        if (!sessionData) {
            window.location.replace("index.html");
        }
        const user = JSON.parse(sessionData);
    </script>

    <nav class="bg-slate-900/80 backdrop-blur-md text-white py-4 px-6 sticky top-0 z-50 border-b border-slate-800 shadow-2xl">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-yellow-500 p-2 rounded-xl shadow-lg shadow-yellow-900/20">
                    <span class="text-lg">🎓</span>
                </div>
                <div>
                    <span class="font-extrabold uppercase tracking-tighter italic text-xs block">Portal Siswa</span>
                    <span class="text-yellow-500 font-bold text-[10px] tracking-widest uppercase">SMPN 110 Jakarta</span>
                </div>
            </div>
            <button onclick="openLogoutModal()" class="bg-red-500/10 hover:bg-red-600 text-red-500 hover:text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase transition-all border border-red-500/20">
                Keluar
            </button>
        </div>
    </nav>

    <main class="container mx-auto px-4 mt-8 max-w-5xl">
        
        <div class="glass-card rounded-[40px] md:rounded-[50px] overflow-hidden fade-in mb-12">
            <div class="py-12 md:py-16 navy-gradient relative text-center md:text-left px-8 md:px-16">
                <div class="relative z-10">
                    <p class="text-yellow-500 text-[10px] font-black uppercase tracking-[0.4em] mb-2">Selamat Datang,</p>
                    <h2 id="display-nama" class="text-2xl md:text-4xl font-black text-white uppercase italic tracking-tighter">
                        Memuat...
                    </h2>
                </div>
                <div class="absolute -right-4 -bottom-10 text-[120px] opacity-5 pointer-events-none italic font-black text-white">110</div>
            </div>
            
            <div class="px-8 md:px-16 py-10 flex flex-col md:flex-row items-center gap-8 -mt-16 relative z-20">
                <div class="shrink-0 relative">
                    <div class="p-2 bg-slate-800 rounded-[45px] shadow-2xl border border-white/5">
                        <div class="w-40 h-40 md:w-52 md:h-52 bg-slate-900 rounded-[38px] overflow-hidden border-2 border-slate-700">
                            <img id="display-foto" src="" class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-500">
                        </div>
                    </div>
                    <div class="absolute bottom-5 right-5 bg-green-500 w-7 h-7 rounded-full border-4 border-slate-800 status-online"></div>
                </div>

                <div class="flex-1 w-full grid grid-cols-2 gap-4">
                    <div class="bg-slate-800/50 p-6 rounded-[30px] border border-white/5 shadow-inner">
                        <span class="text-[9px] font-black text-slate-500 uppercase block mb-1 tracking-widest">NISN / NIS</span>
                        <span id="display-nis" class="font-bold text-white text-lg tracking-wider">-----</span>
                    </div>
                    <div class="bg-slate-800/50 p-6 rounded-[30px] border border-white/5 shadow-inner">
                        <span class="text-[9px] font-black text-slate-500 uppercase block mb-1 tracking-widest">Kelas</span>
                        <span id="display-kelas" class="font-bold text-yellow-500 text-lg uppercase italic">---</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div onclick="openJadwalModal()" class="menu-item p-10 rounded-[45px] cursor-pointer text-center group active:scale-95">
                <div class="w-16 h-16 bg-indigo-600/20 rounded-2xl flex items-center justify-center text-3xl mb-6 mx-auto text-indigo-400 border border-indigo-500/20 shadow-lg group-hover:scale-110 transition-transform">📅</div>
                <h3 class="text-xl font-black text-white mb-1 uppercase italic">Jadwal</h3>
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Agenda Belajar</p>
            </div>

            <div onclick="location.href='nilai.html'" class="menu-item p-10 rounded-[45px] cursor-pointer text-center group active:scale-95">
                <div class="w-16 h-16 bg-yellow-500/20 rounded-2xl flex items-center justify-center text-3xl mb-6 mx-auto text-yellow-500 border border-yellow-500/20 shadow-lg group-hover:scale-110 transition-transform">📝</div>
                <h3 class="text-xl font-black text-white mb-1 uppercase italic">Nilai</h3>
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Studi Akademik</p>
            </div>

            <div onclick="location.href='absensi.html'" class="menu-item p-10 rounded-[45px] cursor-pointer text-center group active:scale-95">
                <div class="w-16 h-16 bg-emerald-500/20 rounded-2xl flex items-center justify-center text-3xl mb-6 mx-auto text-emerald-400 border border-emerald-500/20 shadow-lg group-hover:scale-110 transition-transform">✅</div>
                <h3 class="text-xl font-black text-white mb-1 uppercase italic">Absensi</h3>
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Rekap Kehadiran</p>
            </div>
        </div>
    </main>

    <div id="modalJadwal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-950/90 backdrop-blur-xl" onclick="closeJadwalModal()"></div>
        <div id="modalJadwalContent" class="relative bg-slate-900 border border-white/10 rounded-[50px] shadow-2xl max-w-4xl w-full p-8 md:p-12 transform transition-all scale-95 opacity-0 duration-300">
            <button onclick="closeJadwalModal()" class="absolute top-8 right-8 text-slate-500 hover:text-white font-bold transition-colors">✕ CLOSE</button>
            <div class="mb-8">
                <h3 class="text-2xl font-black text-white uppercase italic">Jadwal Pelajaran Kelas <span id="title-kelas" class="text-indigo-400">...</span></h3>
            </div>
            <div class="bg-slate-950 rounded-[40px] border-2 border-dashed border-slate-800 min-h-[400px] flex items-center justify-center overflow-hidden">
                <div id="jadwal-loader" class="flex flex-col items-center gap-3">
                    <div class="w-10 h-10 border-4 border-slate-800 border-t-indigo-500 rounded-full animate-spin"></div>
                    <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Sinkronisasi Data...</span>
                </div>
                <img id="jadwal-img" src="" class="hidden w-full h-auto max-h-[65vh] object-contain rounded-[30px] p-2">
            </div>
        </div>
    </div>

    <div id="logoutModal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-950/80 backdrop-blur-md"></div>
        <div id="logoutContent" class="relative bg-slate-900 border border-white/10 rounded-[50px] shadow-2xl max-w-sm w-full p-12 text-center transform transition-all scale-95 opacity-0 duration-300">
            <div class="text-5xl mb-6">👋</div>
            <h3 class="text-2xl font-black text-white mb-2 uppercase italic tracking-tighter">Mau Keluar?</h3>
            <p class="text-slate-500 text-[10px] mb-8 uppercase font-bold tracking-[0.2em]">Sesi Anda akan diakhiri sekarang.</p>
            <div class="flex flex-col gap-3">
                <button onclick="executeLogout()" class="w-full bg-red-600 hover:bg-red-500 text-white font-black py-5 rounded-[25px] shadow-lg shadow-red-900/20 active:scale-95 transition-all text-xs uppercase tracking-widest">Ya, Keluar</button>
                <button onclick="closeLogoutModal()" class="w-full bg-slate-800 text-slate-400 font-black py-5 rounded-[25px] active:scale-95 transition-all text-xs uppercase tracking-widest">Batal</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzWnQfAM6ManP39n_jk07IpeahocJXW0nyFGJSEJ3B4YR3LPR-pLFnt6gKsXLI3FtLf/exec';

        function initProfile() {
            document.getElementById('display-nama').innerText = user.nama || user.NAMA || "Siswa";
            document.getElementById('display-nis').innerText = user.nis || user.nisn || user.NISN || "-----";
            document.getElementById('display-kelas').innerText = user.kelas || user.KELAS || "---";
            
            const fotoUrl = user.url_foto || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.nama)}&background=1e293b&color=fff&size=256&bold=true`;
            document.getElementById('display-foto').src = fotoUrl;
        }

        async function openJadwalModal() {
            const modal = document.getElementById('modalJadwal');
            const content = document.getElementById('modalJadwalContent');
            const img = document.getElementById('jadwal-img');
            const loader = document.getElementById('jadwal-loader');
            const userKelas = String(user.kelas || user.KELAS || "").trim();

            document.getElementById('title-kelas').innerText = userKelas;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);

            img.classList.add('hidden');
            loader.classList.remove('hidden');

            try {
                const res = await fetch(`${API_URL}?sheet=Jadwal&t=${Date.now()}`);
                const data = await res.json();
                const match = data.find(item => 
                    String(item.kelas || item.KELAS || item.nama_jadwal || "").toLowerCase().includes(userKelas.toLowerCase())
                ) || data[0];

                const urlGambar = match.url_pdf || match.URL_PDF || match.url_gambar;

                if (urlGambar) {
                    img.src = urlGambar;
                    img.onload = () => {
                        loader.classList.add('hidden');
                        img.classList.remove('hidden');
                    };
                } else {
                    loader.innerHTML = '<span class="text-red-500 font-bold uppercase tracking-widest text-[10px]">Gambar Tidak Ditemukan</span>';
                }
            } catch (e) {
                loader.innerHTML = '<span class="text-red-500 font-bold uppercase tracking-widest text-[10px]">Gagal Sinkron Server</span>';
            }
        }

        function closeJadwalModal() {
            document.getElementById('modalJadwalContent').classList.add('scale-95', 'opacity-0');
            setTimeout(() => document.getElementById('modalJadwal').classList.add('hidden'), 300);
        }

        function openLogoutModal() {
            document.getElementById('logoutModal').classList.remove('hidden');
            document.getElementById('logoutModal').classList.add('flex');
            setTimeout(() => {
                document.getElementById('logoutContent').classList.remove('scale-95', 'opacity-0');
                document.getElementById('logoutContent').classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closeLogoutModal() {
            document.getElementById('logoutContent').classList.add('scale-95', 'opacity-0');
            setTimeout(() => document.getElementById('logoutModal').classList.add('hidden'), 300);
        }

        function executeLogout() {
            localStorage.clear();
            window.location.replace("index.html");
        }

        window.onload = initProfile;
    </script>
</body>
</html>
