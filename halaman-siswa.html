<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Siswa | SMPN 110 Jakarta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617; 
            color: #f8fafc; 
            min-height: 100vh;
        }
        
        /* Background Engine Tanpa Lapisan Gelap */
        #bg-canvas {
            position: fixed;
            inset: 0;
            z-index: -2;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* Card disesuaikan agar teks terbaca di BG Terang */
        .glass-card { 
            background: rgba(15, 23, 42, 0.85); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        
        .foto-profile-container {
            width: 100px; height: 100px; border-radius: 50%;
            border: 3px solid #eab308; padding: 3px; position: relative;
            background: #1e293b; overflow: hidden;
        }
        .foto-profile-container img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        
        .upload-hint {
            position: absolute; inset: 0; background: rgba(0,0,0,0.6);
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; opacity: 0; transition: 0.3s; cursor: pointer;
        }
        .foto-profile-container:hover .upload-hint { opacity: 1; }

        th { font-size: 10px !important; padding: 15px 8px !important; background-color: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255,255,255,0.05); text-transform: uppercase; text-align: center !important; color: #94a3b8; }
        td { padding: 15px 8px !important; border: 1px solid rgba(255,255,255,0.03); font-size: 12px !important; vertical-align: middle; text-align: center !important; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="bg-canvas"></div>

    <div class="max-w-6xl mx-auto">
        <div class="glass-card rounded-[40px] p-8 mb-8 relative overflow-hidden">
            <div class="flex flex-col md:flex-row items-center gap-8 relative z-10">
                <div class="foto-profile-container">
                    <img id="display-foto" src="https://via.placeholder.com/150">
                    <label for="input-foto" class="upload-hint">
                        <span class="text-[10px] text-white font-bold text-center">UBAH FOTO</span>
                    </label>
                    <input type="file" id="input-foto" class="hidden" accept="image/*" onchange="uploadFoto(this)">
                </div>

                <div class="text-center md:text-left">
                    <p class="text-yellow-500 font-black text-xs uppercase tracking-[0.2em] mb-1">Panel Peserta Didik</p>
                    <h1 id="nama-siswa" class="text-2xl md:text-4xl font-black italic uppercase tracking-tighter mb-2 text-white">MEMUAT...</h1>
                    <div class="flex flex-wrap justify-center md:justify-start gap-4 text-slate-400 font-bold text-sm uppercase">
                        <span id="nisn-siswa" class="bg-white/5 px-3 py-1 rounded-lg border border-white/5">NISN: -</span>
                        <span id="kelas-tag" class="bg-white/5 px-3 py-1 rounded-lg border border-white/5">KELAS: -</span>
                    </div>
                </div>
            </div>

            <button onclick="logoutSiswa()" class="absolute top-8 right-8 z-20 p-3 bg-red-500/10 hover:bg-red-500 rounded-2xl group transition-all duration-300">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-red-500 group-hover:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
            </button>
        </div>

        <div class="glass-card rounded-[40px] overflow-hidden shadow-2xl">
            <div class="p-6 border-b border-white/5 bg-white/5 flex justify-between items-center">
                <h3 class="text-[12px] font-black text-slate-400 uppercase tracking-widest italic">Laporan Hasil Belajar Digital</h3>
                <span id="status-semester" class="text-[10px] px-4 py-1.5 rounded-full font-black uppercase tracking-wider text-white">...</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full border-collapse">
                    <thead>
                        <tr class="text-slate-400">
                            <th class="w-12">No</th>
                            <th class="text-left pl-6">Mata Pelajaran</th>
                            <th class="w-20 bg-white/5">KKM</th>
                            <th class="w-20 text-yellow-500">PH1</th>
                            <th class="w-20 text-yellow-500">PH2</th>
                            <th class="w-20 text-blue-400">UTS</th>
                            <th class="w-20 text-green-400">UAS</th>
                            <th class="w-24 text-sky-400 bg-sky-500/10 italic">AKHIR</th>
                        </tr>
                    </thead>
                    <tbody id="tabel-nilai">
                        <tr>
                            <td colspan="8" class="p-20 text-center text-slate-500 italic font-bold uppercase text-[11px] tracking-widest">
                                <div class="animate-pulse">Menyingkronkan Data Nilai...</div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbz22SMTpeUNN3SGduXJbMUJPVGtvsmMpP4TGV17nXWPiu0gLc8ZXFxjyJITKtV9Dq_H/exec';
        let USER = JSON.parse(localStorage.getItem('userSiswa'));

        if (!USER) window.location.replace('index.html');

        // Init Identitas & Background
        function initApp() {
            document.getElementById('nama-siswa').innerText = USER.nama || USER.NAMA || "DATA KOSONG";
            document.getElementById('nisn-siswa').innerText = `NISN: ${USER.nisn || USER.NISN || "-"}`;
            document.getElementById('kelas-tag').innerText = `KELAS: ${USER.kelas || USER.KELAS || "-"}`;
            
            if (USER.foto || USER.FOTO) {
                document.getElementById('display-foto').src = USER.foto || USER.FOTO;
            }

            const savedBg = localStorage.getItem('selected_bg');
            if(savedBg) {
                document.getElementById('bg-canvas').style.backgroundImage = `url('${savedBg.replace("i.ibb.co/", "i.ibb.co.com/")}')`;
            }
            
            setOtomatisSemester();
            loadNilai();
        }

        function setOtomatisSemester() {
            const bulan = new Date().getMonth() + 1;
            const el = document.getElementById('status-semester');
            if (bulan >= 7 && bulan <= 12) {
                el.innerText = "Semester Ganjil";
                el.classList.add("bg-indigo-600");
            } else {
                el.innerText = "Semester Genap";
                el.classList.add("bg-emerald-600");
            }
        }

        async function loadNilai() {
            try {
                const response = await fetch(`${API_URL}?sheet=Nilai&t=${Date.now()}`);
                const allNilai = await response.json();
                const loggedInNisn = String(USER.nisn || USER.NISN).trim();
                
                // Filter data berdasarkan NISN siswa yang login
                const myRawNilai = allNilai.filter(n => String(n.nisn || n.NISN).trim() === loggedInNisn);
                
                // --- LOGIKA ANTI-GANDA (UNIQUE MAPEL) ---
                const uniqueMap = new Map();
                myRawNilai.forEach(item => {
                    const key = String(item.mapel || item.MAPEL).trim().toUpperCase();
                    // Timpa data lama jika ada mapel yang sama (mengambil inputan terbaru)
                    uniqueMap.set(key, item); 
                });
                const myNilai = Array.from(uniqueMap.values());
                // ----------------------------------------

                const container = document.getElementById('tabel-nilai');

                if (myNilai.length === 0) {
                    container.innerHTML = '<tr><td colspan="8" class="p-20 text-center text-slate-500 font-bold uppercase text-[11px]">Belum ada data nilai tersedia.</td></tr>';
                    return;
                }

                container.innerHTML = myNilai.map((n, i) => {
                    const ph1 = Number(n.nilai_ph1 || n.PH1 || 0);
                    const ph2 = Number(n.nilai_ph2 || n.PH2 || 0);
                    const uts = Number(n.nilai_uts || n.UTS || 0);
                    const uas = Number(n.nilai_uas || n.UAS || 0);
                    
                    // Hitung nilai akhir sesuai standar sekolah
                    const akhir = Math.round((((ph1 + ph2) / 2 * 2) + uts + uas) / 4);
                    
                    return `
                        <tr class="hover:bg-white/5 transition-colors">
                            <td class="text-center text-slate-500 font-mono">${i+1}</td>
                            <td class="text-left pl-6 font-bold text-white uppercase italic tracking-tight">${n.mapel || n.MAPEL || "-"}</td>
                            <td class="text-center text-slate-400 bg-white/5 font-bold">82</td>
                            <td class="text-center text-yellow-500 font-bold">${ph1}</td>
                            <td class="text-center text-yellow-500 font-bold">${ph2}</td>
                            <td class="text-center text-blue-400 font-bold">${uts}</td>
                            <td class="text-center text-green-400 font-bold">${uas}</td>
                            <td class="text-center bg-sky-500/10">
                                <span class="${akhir < 82 ? 'text-red-500' : 'text-sky-400'} font-black text-sm italic">${akhir}</span>
                            </td>
                        </tr>`;
                }).join('');
            } catch (error) { 
                console.error("Gagal memuat nilai"); 
            }
        }

        async function uploadFoto(input) {
            const file = input.files[0];
            if (!file) return;

            Swal.fire({ title: 'Mengupload...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = async () => {
                    const canvas = document.createElement('canvas');
                    let width = 300, height = 300;
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6);
                    
                    try {
                        const res = await fetch(API_URL, {
                            method: 'POST',
                            body: JSON.stringify({ 
                                action: "update_foto", 
                                nisn: String(USER.nisn || USER.NISN).trim(), 
                                foto_base64: compressedBase64 
                            })
                        });
                        
                        if ((await res.text()).trim() === "Berhasil") {
                            document.getElementById('display-foto').src = compressedBase64;
                            USER.foto = compressedBase64;
                            localStorage.setItem('userSiswa', JSON.stringify(USER));
                            Swal.fire("Berhasil!", "Foto profil diperbarui.", "success");
                        }
                    } catch (err) { 
                        Swal.fire("Gagal", "Terjadi kesalahan sistem.", "error"); 
                    } finally { input.value = ""; }
                };
            };
            reader.readAsDataURL(file);
        }

        function logoutSiswa() {
            Swal.fire({
                title: 'Keluar Portal?',
                text: "Anda harus login kembali untuk melihat nilai.",
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'Ya, Keluar'
            }).then((res) => {
                if (res.isConfirmed) {
                    localStorage.removeItem('userSiswa');
                    window.location.replace('index.html');
                }
            });
        }

        window.onload = initApp;
    </script>
</body>
</html>
